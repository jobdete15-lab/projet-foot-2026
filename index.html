<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Logistic - Tactique CAP 2027</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --fm-blue: #0033a0; --fm-cyan: #00b5e2; 
            --eco-green: #2ecc71; --partner-gold: #f1c40f;
            --pitch-1: #0e3b1c; --pitch-2: #124d25; --lines: rgba(255,255,255,0.4);
            --bg-dark: #07090b;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; background: var(--bg-dark); color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }

        /* === BARRE DE NAVIGATION (STYLE APP MOBILE/WEB) === */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,10,10,0.95); border-top: 1px solid #333; display: flex; justify-content: space-around; padding: 15px 0; z-index: 2000; backdrop-filter: blur(10px); }
        .nav-item { color: #888; text-decoration: none; font-weight: bold; font-size: 1rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.3s; }
        .nav-item.active { color: var(--fm-cyan); text-shadow: 0 0 10px rgba(0, 181, 226, 0.5); }
        
        .page { display: none; width: 100%; min-height: 100vh; flex-direction: column; align-items: center; padding-top: 20px; }
        .page.active { display: flex; }

        /* === ÉCRAN DE CONNEXION === */
        #login-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 40px; border-radius: 15px; border: 1px solid var(--fm-cyan); text-align: center; width: 80%; max-width: 350px; }
        input { display: block; margin: 15px auto; padding: 12px; border-radius: 8px; border: 1px solid #333; width: 85%; background: #000; color: white; text-align: center; font-size: 1rem; }
        .btn-login { background: var(--fm-cyan); color: #000; font-weight: bold; padding: 12px 30px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; width: 90%; font-size: 1rem; }

        /* === HEADER === */
        .header { text-align: center; padding: 10px; width: 100%; }
        h1 { margin: 0; font-size: 1.8rem; letter-spacing: 2px; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .live-badge { color: #ff4444; font-size: 0.8rem; font-weight: bold; animation: pulse 2s infinite; margin-top: 5px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* === LE TERRAIN 3D (AXONOMÉTRIQUE) === */
        .scene-3d { perspective: 1200px; width: 95%; max-width: 800px; margin: 30px auto; position: relative; }
        .pitch-container {
            width: 100%; height: 500px; position: relative;
            transform: rotateX(45deg); transform-style: preserve-3d;
            box-shadow: 0 40px 60px rgba(0,0,0,0.8); border: 4px solid #333; border-radius: 10px;
        }
        .pitch {
            position: absolute; inset: 0; background: repeating-linear-gradient(90deg, var(--pitch-1) 0%, var(--pitch-1) 10%, var(--pitch-2) 10%, var(--pitch-2) 20%);
            border: 2px solid var(--lines); overflow: hidden;
        }
        /* Marquages au sol */
        .pitch::before { content: ''; position: absolute; inset: 15px; border: 2px solid var(--lines); pointer-events: none; }
        .mid-line { position: absolute; left: 50%; top: 15px; bottom: 15px; width: 2px; background: var(--lines); transform: translateX(-50%); pointer-events: none; }
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border: 2px solid var(--lines); border-radius: 50%; pointer-events: none; }
        .surface { position: absolute; top: 50%; transform: translateY(-50%); width: 100px; height: 200px; border: 2px solid var(--lines); pointer-events: none; }
        .surface-left { left: 15px; border-left: none; } .surface-right { right: 15px; border-right: none; }

        /* Banc de touche (au-dessus du terrain) */
        .bench { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); width: 250px; height: 50px; background: rgba(30,30,30,0.9); border: 2px solid #555; border-radius: 8px; display: flex; justify-content: center; gap: 30px; align-items: center; z-index: 20; }

        /* === LES MAILLOTS (JOUEURS) === */
        .player {
            position: absolute; width: 50px; height: 50px; transform: translate(-50%, -50%) rotateX(-45deg); 
            cursor: pointer; transition: 0.3s; z-index: 10; display: flex; flex-direction: column; align-items: center; 
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.6));
        }
        .player:hover { transform: translate(-50%, -60%) rotateX(-45deg) scale(1.1); filter: drop-shadow(0 15px 10px rgba(0,0,0,0.8)); }
        .player-svg { width: 100%; height: 100%; transition: 0.3s; filter: grayscale(0.8) opacity(0.6); }
        .player-num { font-weight: bold; font-size: 0.75rem; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 10px; border: 1px solid #444; position: absolute; bottom: -12px; color: white; }

        /* Maillots Validés (Lumineux) */
        .player.active .player-svg { filter: grayscale(0) opacity(1); }
        .player.active.fm .player-svg { filter: drop-shadow(0 0 15px var(--fm-cyan)); }
        .player.active.eco .player-svg { filter: drop-shadow(0 0 15px var(--eco-green)); }
        .player.active.part .player-svg { filter: drop-shadow(0 0 15px var(--partner-gold)); }

        /* Animation de la Passe */
        .passe-anim { position: absolute; font-size: 20px; z-index: 50; transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); pointer-events: none; text-shadow: 0 10px 5px rgba(0,0,0,0.5); }

        /* === MODAL (BULLE D'OBJECTIF) === */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 4000; backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .modal-box { background: #111; border: 1px solid #333; padding: 30px; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .modal-cat { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .modal-title { font-size: 1.1rem; color: #fff; font-weight: bold; line-height: 1.4; margin-bottom: 25px; }
        .btn-valider { background: var(--fm-cyan); color: #000; font-weight: bold; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-fermer { background: transparent; color: #888; border: none; cursor: pointer; text-decoration: underline; }

        /* === PAGE CHAT === */
        .chat-box { width: 90%; max-width: 600px; background: #111; border: 1px solid #333; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; height: 60vh; }
        .messages { flex: 1; background: #000; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 10px; }
        .msg-line { margin-bottom: 10px; font-size: 0.9rem; line-height: 1.4; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; }
        .msg-name { font-weight: bold; margin-right: 5px; }
        .chat-inputs { display: flex; flex-direction: column; gap: 10px; }
        .chat-inputs input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; font-size: 0.9rem; }
        .btn-envoyer { background: var(--fm-cyan); color: #000; font-weight: bold; border: none; border-radius: 8px; padding: 12px; cursor: pointer; }

        canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 9999; display: none; }
        .btn-retour-action { background: transparent; border: 1px solid #ff9800; color: #ff9800; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--fm-cyan); margin-top:0;">FM LOGISTIC 2027</h2>
            <p style="font-size:0.8rem; color:#aaa;">Portail Stratégique Sécurisé</p>
            <input type="text" id="user" placeholder="Identifiant (admin)">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn-login" onclick="checkLogin()">Accéder au Plan</button>
            <p id="error" style="color:#ff4444; font-size:0.9rem; margin-top:10px;"></p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('page-terrain', this)">🏟️<span>Tactique</span></div>
        <div class="nav-item" onclick="switchPage('page-chat', this)">💬<span>Discussion</span></div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <div class="modal-cat" id="modal-cat">Catégorie</div>
            <div class="modal-title" id="modal-title">Description de l'objectif...</div>
            <button class="btn-valider" onclick="confirmerValidation()">VALIDER CETTE STRATÉGIE</button>
            <button class="btn-fermer" onclick="fermerModal()">Fermer</button>
        </div>
    </div>

    <div id="page-terrain" class="page active">
        <div class="header">
            <h1>PLAN TACTIQUE 2027</h1>
            <div class="live-badge">🔴 Synchro Temps Réel</div>
        </div>

        <div class="scene-3d">
            <div class="pitch-container">
                <div class="bench" id="bench-container"></div>
                <div class="pitch" id="arena">
                    <div class="surface surface-left"></div>
                    <div class="mid-line"></div>
                    <div class="center-circle"></div>
                    <div class="surface surface-right"></div>
                    <svg id="svg-lines" style="position:absolute; inset:0; width:100%; height:100%; z-index:1; pointer-events:none;"></svg>
                    </div>
            </div>
        </div>
        <button class="btn-retour-action" onclick="annulerDerniereAction()">↩️ Annuler la dernière passe</button>
    </div>

    <div id="page-chat" class="page">
        <div class="header">
            <h1>NOTES DE L'ÉQUIPE</h1>
        </div>
        <div class="chat-box">
            <div class="messages" id="chat-messages"></div>
            <div class="chat-inputs">
                <input type="text" id="chat-name" placeholder="Votre prénom">
                <input type="text" id="chat-text" placeholder="Tapez votre message...">
                <button class="btn-envoyer" onclick="envoyerMessage()">Publier</button>
            </div>
        </div>
    </div>

    <canvas id="confetti"></canvas>

    <script>
        // === CLÉS FIREBASE (RÉPARÉES) ===
        const firebaseConfig = {
            apiKey: "AIzaSyCJGFiEeRAa7Kar7YYilrtxirQbG5Yxo4E",
            authDomain: "projet-2026-be8d4.firebaseapp.com",
            databaseURL: "https://projet-2026-be8d4-default-rtdb.firebaseio.com",
            projectId: "projet-2026-be8d4",
            storageBucket: "projet-2026-be8d4.firebasestorage.app",
            messagingSenderId: "487136771744",
            appId: "1:487136771744:web:94f9efededb4038b1353c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // === AUDIOS ===
        const sonPasse = new Audio('https://assets.mixkit.co/active_storage/sfx/2143/2143-preview.mp3'); 
        const sonValidation = new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'); 
        const sonVictoire = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'); 

        // === DESIGN DES MAILLOTS (SVGs Pros) ===
        const svgFM = `<svg viewBox="0 0 100 100" class="player-svg"><path d="M 25 15 C 35 15 40 25 50 25 C 60 25 65 15 75 15 C 85 15 90 30 90 35 L 85 85 C 65 90 35 90 15 85 L 10 35 C 10 30 15 15 25 15 Z" fill="#0033a0" stroke="#fff" stroke-width="2"/><text x="50" y="60" font-family="Arial" font-weight="900" font-size="28" fill="#fff" text-anchor="middle">👥</text></svg>`;
        const svgPlanete = `<svg viewBox="0 0 100 100" class="player-svg"><path d="M 25 15 C 35 15 40 25 50 25 C 60 25 65 15 75 15 C 85 15 90 30 90 35 L 85 85 C 65 90 35 90 15 85 L 10 35 C 10 30 15 15 25 15 Z" fill="#2ecc71" stroke="#fff" stroke-width="2"/><text x="50" y="60" font-family="Arial" font-weight="900" font-size="28" fill="#fff" text-anchor="middle">🌍</text></svg>`;
        const svgPartenaire = `<svg viewBox="0 0 100 100" class="player-svg"><path d="M 25 15 C 35 15 40 25 50 25 C 60 25 65 15 75 15 C 85 15 90 30 90 35 L 85 85 C 65 90 35 90 15 85 L 10 35 C 10 30 15 15 25 15 Z" fill="#f1c40f" stroke="#fff" stroke-width="2"/><text x="50" y="60" font-family="Arial" font-weight="900" font-size="28" fill="#000" text-anchor="middle">🤝</text></svg>`;

        // === DONNÉES DES 13 MAILLOTS (Résumés Ultra Précis) ===
        const joueurs = [
            { id: 1, type: "fm", svg: svgFM, x: '10%', y: '50%', titre: "DÉVELOPPER LES COMPÉTENCES ET L'EMPLOYABILITÉ DES ÉQUIPES" },
            { id: 2, type: "fm", svg: svgFM, x: '25%', y: '20%', titre: "RITUELS MANAGÉRIAUX POUR LA SÉCURITÉ ET LUTTE CONTRE L'ABSENTÉISME" },
            { id: 3, type: "eco", svg: svgPlanete, x: '25%', y: '40%', titre: "RÉDUIRE L'EMPREINTE CARBONE DE L'ENSEMBLE DES OPÉRATIONS DE 20%" },
            { id: 4, type: "eco", svg: svgPlanete, x: '25%', y: '60%', titre: "DÉPLOYER DES FLOTTES DE TRANSPORT ÉCO-RESPONSABLES ET ÉLECTRIQUES" },
            { id: 5, type: "fm", svg: svgFM, x: '25%', y: '80%', titre: "PROGRAMME DE MENTORAT ET TRANSMISSION DES SAVOIRS EN INTERNE" },
            { id: 6, type: "part", svg: svgPartenaire, x: '50%', y: '25%', titre: "RENFORCER LA COLLABORATION CLIENTS ET OPTIMISER LA SUPPLY CHAIN" },
            { id: 7, type: "fm", svg: svgFM, x: '50%', y: '50%', titre: "PROMOUVOIR L'INCLUSION, LA PARITÉ ET LA DIVERSITÉ AU QUOTIDIEN" },
            { id: 8, type: "part", svg: svgPartenaire, x: '50%', y: '75%', titre: "CO-CRÉATION D'INNOVATIONS LOGISTIQUES AVEC NOS PARTENAIRES STRATÉGIQUES" },
            { id: 9, type: "eco", svg: svgPlanete, x: '75%', y: '25%', titre: "OBJECTIF ZÉRO DÉCHET SUR LA TOTALITÉ DE NOS SITES" },
            { id: 10, type: "part", svg: svgPartenaire, x: '75%', y: '50%', titre: "AMÉLIORER LA PRODUCTIVITÉ OPÉRATIONNELLE ET LA QUALITÉ DE SERVICE" },
            { id: 11, type: "fm", svg: svgFM, x: '75%', y: '75%', titre: "GARANTIR LE BIEN-ÊTRE ET LA SANTÉ AU TRAVAIL DES COLLABORATEURS" },
            { id: 12, type: "part", svg: svgPartenaire, bench: true, titre: "FORGING PARTNERSHIPS FOR LOGISTICS INNOVATION AND MARKET ANTICIPATION" },
            { id: 13, type: "eco", svg: svgPlanete, bench: true, titre: "SYNERGIES INTERNATIONALES POUR UNE LOGISTIQUE DURABLE ET CIRCULAIRE" }
        ];

        let state = []; 
        let maillotEnAttente = null; 
        let aGagne = false;

        // Navigation
        function switchPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }

        // Connexion
        function checkLogin() {
            if(document.getElementById('user').value.trim() === 'admin' && document.getElementById('pass').value.trim() === 'admin') {
                document.getElementById('login-screen').style.display = 'none';
                initJeu();
            } else { document.getElementById('error').innerText = "Identifiants incorrects."; }
        }

        // Initialisation
        function initJeu() {
            const pitch = document.getElementById('arena');
            const bench = document.getElementById('bench-container');

            joueurs.forEach(j => {
                const div = document.createElement('div');
                div.className = `player ${j.type}`;
                div.id = `joueur-${j.id}`;
                div.innerHTML = j.svg + `<div class="player-num">${j.id}</div>`;
                div.onclick = () => ouvrirModal(j);

                if (j.bench) {
                    div.style.position = 'relative'; div.style.transform = 'none';
                    bench.appendChild(div);
                } else {
                    div.style.left = j.x; div.style.top = j.y;
                    pitch.appendChild(div);
                }
            });

            // Écoute Firebase
            db.ref('fm_tactique_2027').on('value', (snapshot) => {
                const data = snapshot.val();
                state = []; 
                document.querySelectorAll('.player').forEach(el => el.classList.remove('active'));

                if (data) {
                    const sorted = Object.keys(data).map(k => ({ id: parseInt(k), time: data[k].timestamp })).sort((a,b) => a.time - b.time);
                    sorted.forEach(item => {
                        state.push(item.id);
                        document.getElementById(`joueur-${item.id}`).classList.add('active');
                    });
                }
                drawLines();

                if(state.length === joueurs.length && !aGagne) { 
                    sonVictoire.play().catch(e=>{}); launchConfetti(); aGagne = true;
                } else if (state.length < joueurs.length) { aGagne = false; }
            });

            // Écoute Chat
            db.ref('fm_chat_2027').on('value', (snapshot) => {
                const data = snapshot.val();
                const box = document.getElementById('chat-messages');
                box.innerHTML = '';
                if(data) {
                    Object.values(data).sort((a,b) => a.time - b.time).forEach(m => {
                        const c = genererCouleur(m.name);
                        box.innerHTML += `<div class="msg-line"><span class="msg-name" style="color:${c}">${m.name} :</span><span style="color:#ddd">${m.text}</span></div>`;
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });
        }

        function genererCouleur(nom) {
            let hash = 0; for (let i=0; i<nom.length; i++) hash = nom.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash % 360)}, 80%, 65%)`;
        }

        // Modal
        function ouvrirModal(j) {
            if(state.includes(j.id)) return;
            maillotEnAttente = j.id;
            
            let icon = "👥 People"; let col = "var(--fm-cyan)";
            if(j.type === "eco") { icon = "🌍 Environnement"; col = "var(--eco-green)"; }
            if(j.type === "part") { icon = "🤝 Partenaire"; col = "var(--partner-gold)"; }

            document.getElementById('modal-cat').innerHTML = `<span style="color:${col}">${icon}</span>`;
            document.getElementById('modal-title').innerText = j.titre;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function fermerModal() { maillotEnAttente = null; document.getElementById('modal-overlay').style.display = 'none'; }

        function confirmerValidation() {
            if(maillotEnAttente) {
                const idCible = maillotEnAttente;
                fermerModal();
                if (state.length > 0) { animerPasse(state[state.length - 1], idCible); } 
                else { validerOfficiellement(idCible); }
            }
        }

        // Animation de la Passe ⚽
        function animerPasse(idDepart, idArrivee) {
            sonPasse.currentTime = 0; sonPasse.play().catch(e=>{});

            const p1 = document.getElementById(`joueur-${idDepart}`);
            const p2 = document.getElementById(`joueur-${idArrivee}`);
            const r1 = p1.getBoundingClientRect(); const r2 = p2.getBoundingClientRect();
            const arena = document.getElementById('arena').getBoundingClientRect();

            const balle = document.createElement('div');
            balle.className = 'passe-anim'; balle.innerText = "⚽";
            
            // Calculs relatifs au terrain pour respecter la 3D
            let sX = r1.left - arena.left + r1.width/2 - 10; let sY = r1.top - arena.top + r1.height/2 - 10;
            let eX = r2.left - arena.left + r2.width/2 - 10; let eY = r2.top - arena.top + r2.height/2 - 10;

            balle.style.left = sX + 'px'; balle.style.top = sY + 'px';
            document.getElementById('arena').appendChild(balle);
            balle.getBoundingClientRect(); // Force le dessin

            balle.style.left = eX + 'px'; balle.style.top = eY + 'px';

            setTimeout(() => { balle.remove(); validerOfficiellement(idArrivee); }, 600);
        }

        function validerOfficiellement(id) {
            sonValidation.currentTime = 0; sonValidation.play().catch(e=>{});
            db.ref('fm_tactique_2027/' + id).set({ timestamp: Date.now() });
        }

        function annulerDerniereAction() {
            db.ref('fm_tactique_2027').once('value').then((snapshot) => {
                const data = snapshot.val();
                if(data) {
                    let dernierId = null; let maxTime = 0;
                    for (const id in data) { if(data[id].timestamp > maxTime) { maxTime = data[id].timestamp; dernierId = id; } }
                    if(dernierId) { db.ref('fm_tactique_2027/' + dernierId).remove(); }
                }
            });
        }

        // Chat
        function envoyerMessage() {
            const nom = document.getElementById('chat-name').value.trim() || "Anonyme";
            const txt = document.getElementById('chat-text').value.trim();
            if(txt !== "") { 
                db.ref('fm_chat_2027').push({ name: nom, text: txt, time: Date.now() }); 
                document.getElementById('chat-text').value = ""; 
            }
        }
        document.getElementById('chat-text').addEventListener('keypress', (e) => { if(e.key==='Enter') envoyerMessage(); });

        // Lignes
        function drawLines() {
            const svg = document.getElementById('svg-lines'); svg.innerHTML = '';
            for(let i=0; i < state.length - 1; i++) {
                const p1 = document.getElementById(`joueur-${state[i]}`); const p2 = document.getElementById(`joueur-${state[i+1]}`);
                if(p1.parentElement.id !== 'arena' || p2.parentElement.id !== 'arena') continue; 
                
                const b1 = p1.getBoundingClientRect(); const b2 = p2.getBoundingClientRect();
                const rT = document.getElementById('arena').getBoundingClientRect();
                
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", b1.left - rT.left + (b1.width/2)); line.setAttribute("y1", b1.top - rT.top + (b1.height/2));
                line.setAttribute("x2", b2.left - rT.left + (b2.width/2)); line.setAttribute("y2", b2.top - rT.top + (b2.height/2));
                line.setAttribute("stroke", "rgba(255,255,255,0.4)"); line.setAttribute("stroke-width", "3"); line.setAttribute("stroke-dasharray", "8,8");
                svg.appendChild(line);
            }
        }
        window.addEventListener('resize', drawLines);

        // Confettis
        function launchConfetti() {
            const canvas = document.getElementById('confetti'); canvas.style.display = 'block';
            const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let p = []; for(let i=0; i<250; i++) p.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height-canvas.height, w: Math.random()*10+5, d: Math.random()*10, c: `hsl(${Math.random()*360},100%,50%)` });
            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                p.forEach(part => { ctx.fillStyle = part.c; ctx.fillRect(part.x, part.y, part.w, part.w); part.y += Math.cos(part.d) + 3; part.x += Math.sin(0); if(part.y > canvas.height) part.y = -10; });
                requestAnimationFrame(draw);
            }
            draw(); setTimeout(() => { canvas.style.display = 'none'; }, 8000);
        }
    </script>
</body>
</html>
