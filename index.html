<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Logistique - Arena Pro 2026</title>
    <style>
        :root {
            --bleu: #00d2ff; --vert: #39ff14; --rose: #ff007f;
            --pelouse1: #0a2412; --pelouse2: #0d2d16; --ligne: rgba(255,255,255,0.3);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #020503; color: white; margin: 0; padding-bottom: 60px; overflow-x: hidden; }

        /* === ÉCRAN DE CONNEXION === */
        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { 
            background: rgba(10, 10, 10, 0.9); padding: 40px 20px; border-radius: 15px; 
            border: 1px solid var(--vert); text-align: center; box-shadow: 0 10px 30px rgba(57, 255, 20, 0.1); width: 85%; max-width: 350px;
        }
        input { 
            display: block; margin: 15px auto; padding: 15px; border-radius: 8px; border: 1px solid #333; 
            width: 90%; background: #000; color: white; text-align: center; font-size: 1rem; 
        }
        .btn-login { 
            background: var(--vert); color: #000; font-weight: bold; padding: 15px 30px; margin-top: 10px;
            border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; width: 90%; font-size: 1rem;
        }

        /* === HEADER ET MAILLOTS PRO === */
        .header { text-align: center; padding: 20px 10px; }
        h1 { margin: 0 0 15px 0; font-size: 1.6rem; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .maillot-container { display: flex; justify-content: center; gap: 20px; }
        .jersey { display: flex; flex-direction: column; align-items: center; }
        .jersey-svg { width: 55px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.6)); }
        .jersey span { font-size: 0.75rem; font-weight: 800; margin-top: 5px; color: white; opacity: 0.9; }

        /* === LE STADE === */
        .stade {
            position: relative; width: 92%; max-width: 450px; margin: auto;
            background: repeating-linear-gradient(0deg, var(--pelouse1) 0px, var(--pelouse1) 40px, var(--pelouse2) 40px, var(--pelouse2) 80px);
            border: 2px solid #555; border-radius: 8px; padding: 50px 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9) inset, 0 0 20px rgba(0,0,0,0.5); overflow: hidden; transition: 1s;
        }
        .stade.victory { box-shadow: 0 0 50px var(--vert), 0 15px 40px rgba(0,0,0,0.9) inset; border-color: var(--vert); }

        /* Lignes du terrain */
        .stade::before { content: ''; position: absolute; inset: 10px; border: 1px solid var(--ligne); pointer-events: none; }
        .mid-line { position: absolute; top: 50%; left: 10px; right: 10px; height: 1px; background: var(--ligne); pointer-events: none; }
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; border: 1px solid var(--ligne); border-radius: 50%; pointer-events: none; }
        .cage { position: absolute; left: 50%; transform: translateX(-50%); width: 120px; height: 25px; border: 2px solid white; background: rgba(255,255,255,0.05); pointer-events: none; }
        .cage-top { top: 10px; border-top: none; }
        .cage-bot { bottom: 10px; border-bottom: none; }

        /* === BALLONS ET OBJECTIFS === */
        .obj-row { display: flex; align-items: center; margin: 35px 0; cursor: pointer; position: relative; z-index: 10; }
        .obj-row:nth-child(even) { flex-direction: row-reverse; text-align: right; }

        /* Ballon sombre au départ */
        .ball-3d {
            width: 45px; height: 45px; background: radial-gradient(circle at 35% 35%, #666, #111);
            border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: grayscale(1); border: 1px solid #444;
        }
        
        /* Ballons allumés */
        .active .ball-3d { filter: grayscale(0); transform: scale(1.15) rotate(360deg); border: 1px solid white; }
        .active.bleu .ball-3d { background: radial-gradient(circle at 35% 35%, #fff, var(--bleu)); box-shadow: 0 0 25px var(--bleu); }
        .active.vert .ball-3d { background: radial-gradient(circle at 35% 35%, #fff, var(--vert)); box-shadow: 0 0 25px var(--vert); }
        .active.rose .ball-3d { background: radial-gradient(circle at 35% 35%, #fff, var(--rose)); box-shadow: 0 0 25px var(--rose); }

        .label { margin: 0 15px; font-weight: 700; font-size: 0.85rem; color: #888; transition: 0.4s; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; }
        .active .label { color: white; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        /* Feedback texte (Good work) */
        .feedback {
            position: absolute; color: white; font-weight: 900; font-size: 0.8rem; text-transform: uppercase;
            animation: floatUp 1.2s forwards; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 5px; pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2); white-space: nowrap;
        }
        @keyframes floatUp { 0% { opacity: 0; transform: translateY(0) scale(0.8); } 20% { opacity: 1; transform: translateY(-20px) scale(1.1); } 100% { opacity: 0; transform: translateY(-50px) scale(1); } }
        
        .reset-btn { position: fixed; bottom: 15px; right: 15px; background: rgba(255,0,0,0.1); border: 1px solid red; color: red; padding: 10px; font-size: 0.7rem; border-radius: 5px; cursor: pointer; z-index: 100; font-weight: bold; }
        canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
    </style>
</head>

            <p style="font-size:0.8rem; color:#aaa;">Connexion sécurisée</p>
            <input type="text" id="user" placeholder="Identifiant (admin)">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn-login" onclick="checkLogin()">Entrer sur le terrain</button>
            <p id="error" style="color:#ff4444; font-size:0.9rem; margin-top:15px; font-weight:bold;"></p>
