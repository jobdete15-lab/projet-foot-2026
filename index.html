<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Logistique - Arena PC 2026</title>
    <style>
        :root {
            --bleu: #00d2ff; --vert: #39ff14; --rose: #ff007f;
            --pelouse1: #0a2412; --pelouse2: #0d2d16; --ligne: rgba(255,255,255,0.4);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #020503; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* === ÉCRAN DE CONNEXION === */
        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { 
            background: rgba(10, 10, 10, 0.9); padding: 50px 40px; border-radius: 15px; 
            border: 1px solid var(--vert); text-align: center; box-shadow: 0 10px 40px rgba(57, 255, 20, 0.15); width: 400px;
        }
        input { 
            display: block; margin: 20px auto; padding: 15px; border-radius: 8px; border: 1px solid #333; 
            width: 80%; background: #000; color: white; text-align: center; font-size: 1.1rem; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--vert); box-shadow: 0 0 10px rgba(57,255,20,0.3); }
        .btn-login { 
            background: var(--vert); color: #000; font-weight: bold; padding: 15px 30px; margin-top: 15px;
            border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; width: 88%; font-size: 1.1rem; transition: 0.3s;
        }
        .btn-login:hover { box-shadow: 0 0 20px rgba(57, 255, 20, 0.5); transform: scale(1.05); }

        /* === HEADER ET MAILLOTS PRO === */
        .header { text-align: center; padding: 20px; width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 2.5rem; letter-spacing: 3px; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .maillot-container { display: flex; gap: 40px; }
        .jersey { display: flex; flex-direction: column; align-items: center; }
        .jersey-svg { width: 70px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)); transition: 0.3s; }
        .jersey:hover .jersey-svg { transform: translateY(-5px); }
        .jersey span { font-size: 0.9rem; font-weight: 800; margin-top: 8px; color: white; opacity: 0.9; letter-spacing: 1px; }

        /* === LE STADE (HORIZONTAL POUR PC) === */
        .stade-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; padding: 20px; box-sizing: border-box; }
        .stade {
            position: relative; width: 100%; max-width: 1100px; height: 550px;
            background: repeating-linear-gradient(90deg, var(--pelouse1) 0px, var(--pelouse1) 50px, var(--pelouse2) 50px, var(--pelouse2) 100px);
            border: 3px solid #555; border-radius: 10px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9) inset, 0 10px 30px rgba(0,0,0,0.6); overflow: hidden; transition: 1s;
        }
        .stade.victory { box-shadow: 0 0 60px var(--vert), 0 20px 50px rgba(0,0,0,0.9) inset; border-color: var(--vert); }

        /* Lignes du terrain */
        .stade::before { content: ''; position: absolute; inset: 15px; border: 2px solid var(--ligne); pointer-events: none; }
        .mid-line { position: absolute; left: 50%; top: 15px; bottom: 15px; width: 2px; background: var(--ligne); pointer-events: none; transform: translateX(-50%); }
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; border: 2px solid var(--ligne); border-radius: 50%; pointer-events: none; }
        .center-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 6px; height: 6px; background: var(--ligne); border-radius: 50%; pointer-events: none; }
        
        .surface { position: absolute; top: 50%; transform: translateY(-50%); width: 150px; height: 250px; border: 2px solid var(--ligne); pointer-events: none; }
        .surface-left { left: 15px; border-left: none; }
        .surface-right { right: 15px; border-right: none; }

        /* === BALLONS / ORBES === */
        #game-content { display: flex; width: 100%; height: 100%; position: relative; z-index: 10; }
        .colonne { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; padding: 20px 0; }

        .obj-row { display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; transition: 0.3s; }
        .obj-row:hover .ball-3d { transform: scale(1.05); box-shadow: 0 10px 25px rgba(0,0,0,0.9); }

        /* Ballon 3D plus grand avec le texte dedans */
        .ball-3d {
            width: 110px; height: 110px; 
            background: radial-gradient(circle at 35% 35%, #444, #111);
            border-radius: 50%; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.8), inset 0 -10px 20px rgba(0,0,0,0.6); 
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 800; color: #aaa; text-align: center;
            padding: 10px; box-sizing: border-box; line-height: 1.3;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 2px solid #555; position: relative;
        }
        
        /* Reflet de lumière sur la sphère */
        .ball-3d::after {
            content: ''; position: absolute; top: 5px; left: 15%; width: 70%; height: 25%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
            border-radius: 50%; pointer-events: none;
        }
        
        /* Ballons allumés */
        .active .ball-3d { color: white; transform: scale(1.1) !important; border: 2px solid white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .active.bleu .ball-3d { background: radial-gradient(circle at 35% 35%, #666, var(--bleu)); box-shadow: 0 0 30px var(--bleu), inset 0 -10px 20px rgba(0,0,0,0.4); }
        .active.vert .ball-3d { background: radial-gradient(circle at 35% 35%, #666, var(--vert)); box-shadow: 0 0 30px var(--vert), inset 0 -10px 20px rgba(0,0,0,0.4); }
        .active.rose .ball-3d { background: radial-gradient(circle at 35% 35%, #666, var(--rose)); box-shadow: 0 0 30px var(--rose), inset 0 -10px 20px rgba(0,0,0,0.4); }

        /* Feedback texte (Good work) */
        .feedback {
            position: absolute; top: -35px; color: white; font-weight: 900; font-size: 1rem; text-transform: uppercase;
            animation: floatUp 1.2s forwards; background: rgba(0,0,0,0.9); padding: 6px 12px; border-radius: 6px; pointer-events: none;
            border: 1px solid rgba(255,255,255,0.3); white-space: nowrap; z-index: 20;
        }
        @keyframes floatUp { 0% { opacity: 0; transform: translateY(0) scale(0.8); } 20% { opacity: 1; transform: translateY(-20px) scale(1.1); } 100% { opacity: 0; transform: translateY(-60px) scale(1); } }
        
        .reset-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(255,0,0,0.15); border: 1px solid red; color: red; padding: 12px 20px; font-size: 0.9rem; border-radius: 8px; cursor: pointer; z-index: 100; font-weight: bold; transition: 0.3s; }
        .reset-btn:hover { background: red; color: white; }
        canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--vert); margin-top:0; font-size: 2rem;">FM ARENA 2026</h2>
            <p style="font-size:1rem; color:#aaa;">Connexion Admin</p>
            <input type="text" id="user" placeholder="Identifiant (admin)">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn-login" onclick="checkLogin()">Entrer sur le terrain</button>
            <p id="error" style="color:#ff4444; font-size:1rem; margin-top:20px; font-weight:bold;"></p>
        </div>
    </div>

    <div class="header">
        <h1>OBJECTIF 2026</h1>
        <div class="maillot-container">
            <div class="jersey">
                <svg class="jersey-svg" viewBox="0 0 100 100">
                    <path d="M20 30 L35 15 L65 15 L80 30 L80 40 L65 40 L65 85 L35 85 L35 40 L20 40 Z" fill="#00d2ff" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
                    <text x="50" y="60" font-size="22" text-anchor="middle" fill="white">👥</text>
                </svg>
                <span style="color:var(--bleu)">PEOPLE</span>
            </div>
            <div class="jersey">
                <svg class="jersey-svg" viewBox="0 0 100 100">
                    <path d="M20 30 L35 15 L65 15 L80 30 L80 40 L65 40 L65 85 L35 85 L35 40 L20 40 Z" fill="#39ff14" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
                    <text x="50" y="60" font-size="22" text-anchor="middle" fill="black">🌱</text>
                </svg>
                <span style="color:var(--vert)">ENVIRON.</span>
            </div>
            <div class="jersey">
                <svg class="jersey-svg" viewBox="0 0 100 100">
                    <path d="M20 30 L35 15 L65 15 L80 30 L80 40 L65 40 L65 85 L35 85 L35 40 L20 40 Z" fill="#ff007f" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
                    <text x="50" y="60" font-size="22" text-anchor="middle" fill="white">🤝</text>
                </svg>
                <span style="color:var(--rose)">VIVRE</span>
            </div>
        </div>
    </div>

    <div class="stade-container">
        <div class="stade" id="arena">
            <div class="surface surface-left"></div>
            <div class="mid-line"></div>
            <div class="center-circle"></div>
            <div class="center-dot"></div>
            <div class="surface surface-right"></div>
            
            <svg id="svg-lines" style="position:absolute; inset:0; width:100%; height:100%; z-index:1; pointer-events:none;"></svg>
            
            <div id="game-content">
                <div class="colonne" id="col-defense"></div>
                <div class="colonne" id="col-milieu"></div>
                <div class="colonne" id="col-attaque"></div>
            </div>
        </div>
    </div>

    <button class="reset-btn" onclick="resetApp()">RÉINITIALISER LE TERRAIN</button>
    <canvas id="confetti"></canvas>

    <script>
        const objectives = [
            { id: 1, label: "Formation", zone: "bleu", col: "col-defense" },
            { id: 2, label: "Parité H/F", zone: "bleu", col: "col-defense" },
            { id: 3, label: "Mentorat", zone: "bleu", col: "col-defense" },
            { id: 4, label: "Carbone -20%", zone: "vert", col: "col-milieu" },
            { id: 5, label: "Électrique", zone: "vert", col: "col-milieu" },
            { id: 6, label: "Zéro Déchet", zone: "vert", col: "col-milieu" },
            { id: 7, label: "Zéro Accident", zone: "rose", col: "col-attaque" },
            { id: 8, label: "Tournoi Sportif", zone: "rose", col: "col-attaque" },
            { id: 9, label: "Inclusion", zone: "rose", col: "col-attaque" }
        ];

        let state = JSON.parse(localStorage.getItem('fm_pc_sphere')) || [];
        const audioTing = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        const audioVictoire = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

        function checkLogin() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim().toLowerCase();
            
            if(u === 'admin' && p === 'admin') {
                document.getElementById('login-screen').style.display = 'none';
                localStorage.setItem('logged_in_pc_sphere', 'yes');
                init();
            } else { 
                document.getElementById('error').innerText = "Identifiant ou mot de passe incorrect."; 
            }
        }

        if(localStorage.getItem('logged_in_pc_sphere') === 'yes') {
            document.getElementById('login-screen').style.display = 'none';
            init();
        }

        function init() {
            document.getElementById('col-defense').innerHTML = '';
            document.getElementById('col-milieu').innerHTML = '';
            document.getElementById('col-attaque').innerHTML = '';

            objectives.forEach(obj => {
                const active = state.includes(obj.id);
                const row = document.createElement('div');
                row.className = `obj-row ${obj.zone} ${active ? 'active' : ''}`;
                row.dataset.id = obj.id;
                
                // Le texte est maintenant directement DANS la div du ballon
                row.innerHTML = `<div class="ball-3d">${obj.label}</div>`;
                row.onclick = () => activate(obj.id, row);
                
                document.getElementById(obj.col).appendChild(row);
            });
            
            setTimeout(drawLines, 100); 
            if(state.length === objectives.length) document.getElementById('arena').classList.add('victory');
        }

        function activate(id, el) {
            if (state.includes(id)) return;
            state.push(id);
            el.classList.add('active');
            localStorage.setItem('fm_pc_sphere', JSON.stringify(state));
            
            audioTing.currentTime = 0;
            audioTing.play().catch(e => {}); 
            
            showFeedback(el);
            drawLines();

            if(state.length === objectives.length) {
                document.getElementById('arena').classList.add('victory');
                audioVictoire.play().catch(e => {});
                launchConfetti();
            }
        }

        function showFeedback(el) {
            const words = ["Excellent !", "Continuez comme ça !", "Super passe !", "Parfait !", "Bien joué !"];
            const f = document.createElement('div');
            f.className = 'feedback';
            f.innerText = words[Math.floor(Math.random() * words.length)];
            el.appendChild(f);
            setTimeout(() => f.remove(), 1200);
        }

        function drawLines() {
            const svg = document.getElementById('svg-lines');
            svg.innerHTML = '';
            for(let i=0; i < state.length - 1; i++) {
                const b1 = document.querySelector(`[data-id="${state[i]}"] .ball-3d`).getBoundingClientRect();
                const b2 = document.querySelector(`[data-id="${state[i+1]}"] .ball-3d`).getBoundingClientRect();
                const rT = document.getElementById('arena').getBoundingClientRect();
                
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", b1.left - rT.left + (b1.width/2)); 
                line.setAttribute("y1", b1.top - rT.top + (b1.height/2));
                line.setAttribute("x2", b2.left - rT.left + (b2.width/2)); 
                line.setAttribute("y2", b2.top - rT.top + (b2.height/2));
                
                line.setAttribute("stroke", "rgba(255,255,255,0.7)"); 
                line.setAttribute("stroke-width", "2.5");
                line.setAttribute("stroke-dasharray", "6,6");
                svg.appendChild(line);
            }
        }

        window.addEventListener('resize', drawLines);

        function launchConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];
            
            for(let i=0; i<250; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 12 + 6,
                    h: Math.random() * 12 + 6,
                    d: Math.random() * 10,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    tilt: Math.floor(Math.random() * 10) - 10
                });
            }
            
            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.rect(p.x, p.y, p.w, p.h);
                    ctx.fill();
                    p.y += Math.cos(p.d) + 2 + p.w/4;
                    p.x += Math.sin(0);
                    if(p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
                });
                requestAnimationFrame(draw);
            }
            draw();
            setTimeout(() => { canvas.style.display = 'none'; }, 8000);
        }

        function resetApp() { 
            if(confirm("Réinitialiser l'avancement du projet 2026 ?")) { 
                localStorage.removeItem('fm_pc_sphere'); 
                location.reload(); 
            } 
        }
    </script>
</body>
</html>
