<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Tactique Interactif - Multi</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <style>
        body {
            background-color: #0a0e17;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
        }

        button.back-btn {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button.back-btn:hover { background-color: #555; }
        button.back-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #terrain-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* LUMINOSITÉ AUGMENTÉE ICI (0.7 au lieu de 0.4) */
        .fond-terrain {
            width: 100%;
            height: auto;
            display: block;
            filter: brightness(0.7); 
            transition: filter 0.5s ease;
        }

        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .zone {
            position: absolute;
            background-color: rgba(0, 0, 0, 0);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            z-index: 5;
            transition: all 0.3s ease;
        }

        .zone:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.1);
        }

        .zone.active {
            border-color: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), inset 0 0 15px rgba(255, 255, 255, 0.3);
            backdrop-filter: brightness(1.5); 
        }

        /* --- STYLES DES MESSAGES POPUP (TOASTS) --- */
        #toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 100;
            pointer-events: none;
        }

        .toast {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: slideUp 0.5s ease-out, fadeOut 0.5s ease-in 2.5s forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

    </style>
</head>
<body>

    <div class="header">
        <h2>Plan Tactique CAP 2027 (Sync Live)</h2>
        <button id="btn-back" class="back-btn" disabled>🔙 Revenir en arrière</button>
    </div>

    <div id="terrain-container">
        <img src="terrain.jpg" alt="Plan Tactique" class="fond-terrain" id="image-fond">

        <svg id="svg-layer">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="white" opacity="0.8"/>
                </marker>
            </defs>
            <g id="lines-group"></g>
        </svg>

        <div class="zone" id="z-secu" style="top: 22%; left: 23%; width: 13%; height: 6%;"></div>
        <div class="zone" id="z-digital" style="top: 32%; left: 16%; width: 10%; height: 6%;"></div>
        <div class="zone" id="z-housseuse" style="top: 60%; left: 10%; width: 13%; height: 7%;"></div>
        <div class="zone" id="z-espaces" style="top: 70%; left: 22%; width: 10%; height: 6%;"></div>
        <div class="zone" id="z-briefing" style="top: 35%; left: 29%; width: 10%; height: 6%;"></div>

        <div class="zone" id="z-rh" style="top: 27%; left: 44%; width: 12%; height: 6%;"></div>
        <div class="zone" id="z-carbone" style="top: 57%; left: 38%; width: 12%; height: 6%;"></div>
        <div class="zone" id="z-beebryte" style="top: 69%; left: 44%; width: 12%; height: 6%;"></div>

        <div class="zone" id="z-clients" style="top: 22%; left: 67%; width: 15%; height: 6%;"></div>
        <div class="zone" id="z-packsize" style="top: 34%; left: 79%; width: 10%; height: 6%;"></div>
        <div class="zone" id="z-apae" style="top: 55%; left: 64%; width: 11%; height: 6%;"></div>
        <div class="zone" id="z-qualite" style="top: 58%; left: 81%; width: 10%; height: 6%;"></div>
        <div class="zone" id="z-solidaire" style="top: 70%; left: 70%; width: 19%; height: 7%;"></div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Configuration Firebase (Celle que tu as fournie)
        const firebaseConfig = {
            apiKey: "AIzaSyCJGFiEeRAa7Kar7YYilrtxirQbG5Yxo4E",
            authDomain: "projet-2026-be8d4.firebaseapp.com",
            databaseURL: "https://projet-2026-be8d4-default-rtdb.firebaseio.com",
            projectId: "projet-2026-be8d4",
            storageBucket: "projet-2026-be8d4.firebasestorage.app",
            messagingSenderId: "487136771744",
            appId: "1:487136771744:web:94f9efededb4038b1353c5"
        };

        // Initialisation
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'planTactique/historique');

        // Éléments HTML
        const zones = Array.from(document.querySelectorAll('.zone'));
        const svgLayer = document.getElementById('svg-layer');
        const linesGroup = document.getElementById('lines-group');
        const container = document.getElementById('terrain-container');
        const btnBack = document.getElementById('btn-back');
        const toastContainer = document.getElementById('toast-container');

        let localHistory = [];
        let isAnimating = false;
        const totalObjectives = zones.length;

        // Messages d'encouragement
        const messagesPositifs = ["Excellent !", "Bien joué !", "Super passe !", "On avance !", "Objectif validé !", "Parfait !"];

        // Affiche un message Popup (Toast)
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            toastContainer.appendChild(toast);
            setTimeout(() => { if(toast.parentNode) toast.remove(); }, 3000);
        }

        // Calcule le centre d'une zone
        function getCenter(el) {
            const containerRect = container.getBoundingClientRect();
            const elRect = el.getBoundingClientRect();
            return {
                x: elRect.left - containerRect.left + elRect.width / 2,
                y: elRect.top - containerRect.top + elRect.height / 2
            };
        }

        // Dessine la ligne de passe
        function drawLine(start, end) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', start.x);
            line.setAttribute('y1', start.y);
            line.setAttribute('x2', end.x);
            line.setAttribute('y2', end.y);
            line.setAttribute('stroke', 'rgba(255,255,255,0.8)');
            line.setAttribute('stroke-width', '3');
            line.setAttribute('stroke-dasharray', '8,4');
            line.setAttribute('marker-end', 'url(#arrowhead)');
            linesGroup.appendChild(line);
        }

        // Anime le ballon et gère la séquence visuelle d'un nouveau point
        async function playStep(startZoneId, endZoneId, skipAnimation = false) {
            const endElement = document.getElementById(endZoneId);
            if (!endElement) return;

            if (startZoneId) {
                const startElement = document.getElementById(startZoneId);
                const startCenter = getCenter(startElement);
                const endCenter = getCenter(endElement);

                drawLine(startCenter, endCenter);

                if (!skipAnimation) {
                    isAnimating = true;
                    await new Promise(resolve => {
                        const ball = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        ball.setAttribute('r', '8');
                        ball.setAttribute('fill', '#ffffff');
                        ball.setAttribute('cx', startCenter.x);
                        ball.setAttribute('cy', startCenter.y);
                        ball.style.filter = "drop-shadow(0px 0px 5px white)";
                        svgLayer.appendChild(ball);

                        const animation = ball.animate([
                            { cx: startCenter.x, cy: startCenter.y },
                            { cx: endCenter.x, cy: endCenter.y }
                        ], { duration: 800, easing: 'ease-in-out', fill: 'forwards' });

                        animation.onfinish = () => {
                            svgLayer.removeChild(ball);
                            resolve();
                        };
                    });
                    isAnimating = false;
                }
            }

            endElement.classList.add('active');
            
            if(!skipAnimation) {
                // Petit message aléatoire
                showToast(messagesPositifs[Math.floor(Math.random() * messagesPositifs.length)]);
            }
        }

        // Reconstruit le terrain (sans animation lente) en cas de retour arrière ou de rechargement
        function rebuildBoard(historyArray) {
            linesGroup.innerHTML = '';
            zones.forEach(z => z.classList.remove('active'));

            for (let i = 0; i < historyArray.length; i++) {
                const prev = i > 0 ? historyArray[i - 1] : null;
                const curr = historyArray[i];
                playStep(prev, curr, true); // true = skip animation
            }
            btnBack.disabled = historyArray.length === 0;
        }

        // --- SYNCHRONISATION FIREBASE ---

        // Écoute les changements sur la base de données (Quand un joueur clique quelque part)
        onValue(dbRef, async (snapshot) => {
            const remoteHistory = snapshot.val() || [];

            // Si un nouvel objectif a été ajouté
            if (remoteHistory.length > localHistory.length) {
                for (let i = localHistory.length; i < remoteHistory.length; i++) {
                    const prevZone = i > 0 ? remoteHistory[i-1] : null;
                    const nextZone = remoteHistory[i];
                    await playStep(prevZone, nextZone, false); // false = avec animation
                }
                
                // Vérification de la victoire (Tous les objectifs atteints !)
                if (remoteHistory.length === totalObjectives) {
                    setTimeout(() => {
                        confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, zIndex: 1000 });
                        showToast("🎉 CAP 2027 ATTEINT ! 🎉");
                    }, 500);
                }
            } 
            // Si quelqu'un a cliqué sur "Retour en arrière" ou si le terrain a été réinitialisé
            else if (remoteHistory.length < localHistory.length) {
                rebuildBoard(remoteHistory);
            }

            localHistory = remoteHistory;
            btnBack.disabled = localHistory.length === 0;
        });

        // Quand JE clique sur une zone (On envoie à Firebase)
        zones.forEach(zone => {
            zone.addEventListener('click', () => {
                if (isAnimating || localHistory.includes(zone.id)) return; 
                
                const newHistory = [...localHistory, zone.id];
                set(dbRef, newHistory); // Push l'info à Firebase
            });
        });

        // Bouton Retour en arrière
        btnBack.addEventListener('click', () => {
            if (isAnimating || localHistory.length === 0) return;
            
            const newHistory = localHistory.slice(0, -1);
            set(dbRef, newHistory); // Met à jour Firebase
        });

        // Recalcule les lignes si on redimensionne la fenêtre
        window.addEventListener('resize', () => {
            if(!isAnimating) rebuildBoard(localHistory);
        });

    </script>
</body>
</html>
