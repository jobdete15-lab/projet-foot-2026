<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Tactique Interactif - Multi</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <style>
        body {
            background-color: #0a0e17;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
        }

        button.back-btn {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button.back-btn:hover { background-color: #555; }
        button.back-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #terrain-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .fond-terrain {
            width: 100%;
            height: auto;
            display: block;
            filter: brightness(0.7); 
            transition: filter 0.5s ease;
        }

        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* LE NOUVEAU BALLON */
        .ballon {
            position: absolute;
            font-size: 28px;
            /* On décale de la moitié de la taille pour que le centre soit parfait */
            left: -14px; 
            top: -14px;
            z-index: 20;
            pointer-events: none;
            filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.5));
        }

        .zone {
            position: absolute;
            background-color: rgba(0, 0, 0, 0);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            z-index: 5;
            transition: all 0.3s ease;
        }

        .zone:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Allumage selon la couleur de la zone */
        .zone.active[data-marker="rose"] { border-color: #ff2a5f; box-shadow: 0 0 20px rgba(255, 42, 95, 0.8), inset 0 0 15px rgba(255, 42, 95, 0.3); backdrop-filter: brightness(1.5); }
        .zone.active[data-marker="vert"] { border-color: #2aff7b; box-shadow: 0 0 20px rgba(42, 255, 123, 0.8), inset 0 0 15px rgba(42, 255, 123, 0.3); backdrop-filter: brightness(1.5); }
        .zone.active[data-marker="bleu"] { border-color: #2a8dff; box-shadow: 0 0 20px rgba(42, 141, 255, 0.8), inset 0 0 15px rgba(42, 141, 255, 0.3); backdrop-filter: brightness(1.5); }

        #toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 100;
            pointer-events: none;
        }

        .toast {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: slideUp 0.5s ease-out, fadeOut 0.5s ease-in 2.5s forwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>

    <div class="header">
        <h2>Plan Tactique CAP 2027 (Sync Live)</h2>
        <button id="btn-back" class="back-btn" disabled>🔙 Revenir en arrière</button>
    </div>

    <div id="terrain-container">
        <img src="Plan tactique FM.png" alt="Plan Tactique FM" class="fond-terrain" id="image-fond">

        <svg id="svg-layer">
            <defs>
                <marker id="arrowhead-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#ff2a5f" opacity="0.9"/>
                </marker>
                <marker id="arrowhead-vert" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#2aff7b" opacity="0.9"/>
                </marker>
                <marker id="arrowhead-bleu" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#2a8dff" opacity="0.9"/>
                </marker>
            </defs>
            <g id="lines-group"></g>
        </svg>

        <div class="zone" id="z-secu" data-color="#ff2a5f" data-marker="rose" style="top: 22%; left: 23%; width: 13%; height: 6%;"></div>
        <div class="zone" id="z-digital" data-color="#ff2a5f" data-marker="rose" style="top: 32%; left: 16%; width: 10%; height: 6%;"></div>
        <div class="zone" id="z-housseuse" data-color="#ff2a5f" data-marker="rose" style="top: 60%; left: 10%; width: 13%; height: 7%;"></div>
        <div class="zone" id="z-espaces" data-color="#ff2a5f" data-marker="rose" style="top: 70%; left: 22%; width: 10%; height: 6%;"></div>
        <div class="zone" id="z-briefing" data-color="#ff2a5f" data-marker="rose" style="top: 35%; left: 29%; width: 10%; height: 6%;"></div>

        <div class="zone" id="z-rh" data-color="#2aff7b" data-marker="vert" style="top: 27%; left: 44%; width: 12%; height: 6%;"></div>
        <div class="zone" id="z-carbone" data-color="#2aff7b" data-marker="vert" style="top: 57%; left: 38%; width: 12%; height: 6%;"></div>
        <div class="zone" id="z-beebryte" data-color="#2aff7b" data-marker="vert" style="top: 69%; left: 44%; width: 12%; height: 6%;"></div>

        <div class="zone" id="z-clients" data-color="#2a8dff" data-marker="bleu" style="top: 22%; left: 67%; width: 15%; height: 6%;"></div>
        <div class="zone" id="z-packsize" data-color="#2a8dff" data-marker="bleu" style="top: 34%; left: 79%; width: 10%; height: 6%;"></div>
        <div class="zone" id="z-apae" data-color="#2a8dff" data-marker="bleu" style="top: 55%; left: 64%; width: 11%; height: 6%;"></div>
        <div class="zone" id="z-qualite" data-color="#2a8dff" data-marker="bleu" style="top: 58%; left: 81%; width: 10%; height: 6%;"></div>
        <div class="zone" id="z-solidaire" data-color="#2a8dff" data-marker="bleu" style="top: 70%; left: 70%; width: 19%; height: 7%;"></div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJGFiEeRAa7Kar7YYilrtxirQbG5Yxo4E",
            authDomain: "projet-2026-be8d4.firebaseapp.com",
            databaseURL: "https://projet-2026-be8d4-default-rtdb.firebaseio.com",
            projectId: "projet-2026-be8d4",
            storageBucket: "projet-2026-be8d4.firebasestorage.app",
            messagingSenderId: "487136771744",
            appId: "1:487136771744:web:94f9efededb4038b1353c5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'planTactique/historique');

        const zones = Array.from(document.querySelectorAll('.zone'));
        const svgLayer = document.getElementById('svg-layer');
        const linesGroup = document.getElementById('lines-group');
        const container = document.getElementById('terrain-container');
        const btnBack = document.getElementById('btn-back');
        const toastContainer = document.getElementById('toast-container');

        let localHistory = [];
        let isAnimating = false;
        const totalObjectives = zones.length;

        const messagesPositifs = ["Excellent !", "Bien joué !", "Super passe !", "On avance !", "Objectif validé !", "Parfait !"];

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            toastContainer.appendChild(toast);
            setTimeout(() => { if(toast.parentNode) toast.remove(); }, 3000);
        }

        function getCenter(el) {
            const containerRect = container.getBoundingClientRect();
            const elRect = el.getBoundingClientRect();
            return {
                x: elRect.left - containerRect.left + elRect.width / 2,
                y: elRect.top - containerRect.top + elRect.height / 2
            };
        }

        function drawLine(start, end, colorHex, markerName) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', start.x);
            line.setAttribute('y1', start.y);
            line.setAttribute('x2', end.x);
            line.setAttribute('y2', end.y);
            line.setAttribute('stroke', colorHex);
            line.setAttribute('stroke-width', '3');
            line.setAttribute('stroke-dasharray', '8,4');
            line.setAttribute('marker-end', `url(#arrowhead-${markerName})`);
            linesGroup.appendChild(line);
        }

        async function playStep(startZoneId, endZoneId, skipAnimation = false) {
            const endElement = document.getElementById(endZoneId);
            if (!endElement) return;

            const endColor = endElement.getAttribute('data-color');
            const endMarker = endElement.getAttribute('data-marker');

            if (startZoneId) {
                const startElement = document.getElementById(startZoneId);
                const startCenter = getCenter(startElement);
                const endCenter = getCenter(endElement);

                drawLine(startCenter, endCenter, endColor, endMarker);

                if (!skipAnimation) {
                    isAnimating = true;
                    await new Promise(resolve => {
                        // NOUVELLE MÉTHODE POUR LE BALLON : Un élément HTML normal (beaucoup plus stable)
                        const ball = document.createElement('div');
                        ball.className = 'ballon';
                        ball.innerText = '⚽';
                        container.appendChild(ball);

                        // Animation de trajectoire rectiligne parfaite
                        const animation = ball.animate([
                            { transform: `translate(${startCenter.x}px, ${startCenter.y}px)` },
                            { transform: `translate(${endCenter.x}px, ${endCenter.y}px)` }
                        ], { duration: 800, easing: 'linear', fill: 'forwards' });

                        animation.onfinish = () => {
                            if(ball.parentNode) ball.parentNode.removeChild(ball);
                            resolve();
                        };
                    });
                    isAnimating = false;
                }
            }

            endElement.classList.add('active');
            
            if(!skipAnimation) {
                showToast(messagesPositifs[Math.floor(Math.random() * messagesPositifs.length)]);
            }
        }

        function rebuildBoard(historyArray) {
            linesGroup.innerHTML = '';
            zones.forEach(z => z.classList.remove('active'));

            for (let i = 0; i < historyArray.length; i++) {
                const prev = i > 0 ? historyArray[i - 1] : null;
                const curr = historyArray[i];
                playStep(prev, curr, true); 
            }
            btnBack.disabled = historyArray.length === 0;
        }

        onValue(dbRef, async (snapshot) => {
            const remoteHistory = snapshot.val() || [];

            if (remoteHistory.length > localHistory.length) {
                for (let i = localHistory.length; i < remoteHistory.length; i++) {
                    const prevZone = i > 0 ? remoteHistory[i-1] : null;
                    const nextZone = remoteHistory[i];
                    await playStep(prevZone, nextZone, false);
                }
                
                if (remoteHistory.length === totalObjectives) {
                    setTimeout(() => {
                        confetti({ particleCount: 300, spread: 120, origin: { y: 0.6 }, zIndex: 1000 });
                        showToast("🎉 CAP 2027 ATTEINT ! 🎉");
                    }, 500);
                }
            } 
            else if (remoteHistory.length < localHistory.length) {
                rebuildBoard(remoteHistory);
            }

            localHistory = remoteHistory;
            btnBack.disabled = localHistory.length === 0;
        });

        zones.forEach(zone => {
            zone.addEventListener('click', () => {
                if (isAnimating || localHistory.includes(zone.id)) return; 
                const newHistory = [...localHistory, zone.id];
                set(dbRef, newHistory); 
            });
        });

        btnBack.addEventListener('click', () => {
            if (isAnimating || localHistory.length === 0) return;
            const newHistory = localHistory.slice(0, -1);
            set(dbRef, newHistory); 
        });

        window.addEventListener('resize', () => {
            if(!isAnimating) rebuildBoard(localHistory);
        });
    </script>
</body>
</html>
