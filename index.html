<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Tactique Interactif</title>
    <style>
        body {
            background-color: #0a0e17;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
        }

        button.back-btn {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button.back-btn:hover { background-color: #555; }
        button.back-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Le conteneur principal */
        #terrain-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* L'image de fond (Corrigée avec le bon nom de fichier) */
        .fond-terrain {
            width: 100%;
            height: auto;
            display: block;
            /* Filtre pour assombrir l'image au début */
            filter: brightness(0.4); 
            transition: filter 0.5s ease;
        }

        /* Calque SVG pour dessiner les flèches et le ballon */
        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Les zones interactives invisibles */
        .zone {
            position: absolute;
            background-color: rgba(0, 0, 0, 0);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            z-index: 5;
            transition: all 0.3s ease;
        }

        /* Effet au survol */
        .zone:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Effet quand la zone est activée (elle "s'allume") */
        .zone.active {
            border-color: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), inset 0 0 15px rgba(255, 255, 255, 0.3);
            /* Cela "annule" l'assombrissement pour cette zone spécifique */
            backdrop-filter: brightness(2.5); 
        }

    </style>
</head>
<body>

    <div class="header">
        <h2>Plan Tactique CAP 2027</h2>
        <button id="btn-back" class="back-btn" disabled>🔙 Revenir en arrière</button>
    </div>

    <div id="terrain-container">
        <img src="terrain.png" alt="Plan Tactique" class="fond-terrain" id="image-fond">

        <svg id="svg-layer">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="white" opacity="0.8"/>
                </marker>
            </defs>
            <g id="lines-group"></g>
        </svg>

        <div class="zone" id="z-secu" style="top: 22%; left: 24%; width: 12%; height: 6%;"></div>
        <div class="zone" id="z-digital" style="top: 32%; left: 16%; width: 9%; height: 6%;"></div>
        <div class="zone" id="z-housseuse" style="top: 60%; left: 10%; width: 12%; height: 7%;"></div>
        <div class="zone" id="z-espaces" style="top: 70%; left: 23%; width: 9%; height: 6%;"></div>
        <div class="zone" id="z-briefing" style="top: 36%; left: 30%; width: 9%; height: 6%;"></div>

        <div class="zone" id="z-rh" style="top: 27%; left: 45%; width: 11%; height: 5%;"></div>
        <div class="zone" id="z-carbone" style="top: 59%; left: 39%; width: 10%; height: 6%;"></div>
        <div class="zone" id="z-beebryte" style="top: 70%; left: 45%; width: 11%; height: 5%;"></div>

        <div class="zone" id="z-clients" style="top: 21%; left: 68%; width: 13%; height: 6%;"></div>
        <div class="zone" id="z-packsize" style="top: 34%; left: 80%; width: 8%; height: 5%;"></div>
        <div class="zone" id="z-apae" style="top: 57%; left: 65%; width: 10%; height: 6%;"></div>
        <div class="zone" id="z-qualite" style="top: 60%; left: 82%; width: 8%; height: 6%;"></div>
        <div class="zone" id="z-solidaire" style="top: 73%; left: 72%; width: 17%; height: 7%;"></div>
    </div>

    <script>
        const zones = document.querySelectorAll('.zone');
        const svgLayer = document.getElementById('svg-layer');
        const linesGroup = document.getElementById('lines-group');
        const container = document.getElementById('terrain-container');
        const btnBack = document.getElementById('btn-back');

        let history = [];
        let currentZone = null;
        let isAnimating = false;

        // Calcule le centre d'une zone pour le dessin de la flèche
        function getCenter(el) {
            const containerRect = container.getBoundingClientRect();
            const elRect = el.getBoundingClientRect();
            return {
                x: elRect.left - containerRect.left + elRect.width / 2,
                y: elRect.top - containerRect.top + elRect.height / 2
            };
        }

        // Dessine la ligne de passe
        function drawLine(start, end) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', start.x);
            line.setAttribute('y1', start.y);
            line.setAttribute('x2', end.x);
            line.setAttribute('y2', end.y);
            line.setAttribute('stroke', 'rgba(255,255,255,0.8)');
            line.setAttribute('stroke-width', '3');
            line.setAttribute('stroke-dasharray', '8,4');
            line.setAttribute('marker-end', 'url(#arrowhead)');
            linesGroup.appendChild(line);
        }

        // Anime le ballon
        function animateBall(start, end, targetElement) {
            return new Promise((resolve) => {
                isAnimating = true;
                
                const ball = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                ball.setAttribute('r', '8');
                ball.setAttribute('fill', '#ffffff');
                ball.setAttribute('cx', start.x);
                ball.setAttribute('cy', start.y);
                ball.style.filter = "drop-shadow(0px 0px 5px white)";
                svgLayer.appendChild(ball);

                const animation = ball.animate([
                    { cx: start.x, cy: start.y },
                    { cx: end.x, cy: end.y }
                ], {
                    duration: 1000, // 1 seconde de trajet
                    easing: 'ease-in-out',
                    fill: 'forwards'
                });

                animation.onfinish = () => {
                    svgLayer.removeChild(ball);
                    targetElement.classList.add('active'); // Allume la zone d'arrivée
                    isAnimating = false;
                    resolve();
                };
            });
        }

        // Écoute les clics sur chaque zone
        zones.forEach(zone => {
            zone.addEventListener('click', async () => {
                if (isAnimating || zone.classList.contains('active')) return; 

                const currentState = {
                    zoneId: zone.id,
                    prevZone: currentZone ? currentZone.id : null
                };

                if (!currentZone) {
                    zone.classList.add('active');
                    currentZone = zone;
                    history.push(currentState);
                    btnBack.disabled = false;
                } else {
                    const startCenter = getCenter(currentZone);
                    const endCenter = getCenter(zone);
                    
                    drawLine(startCenter, endCenter);
                    await animateBall(startCenter, endCenter, zone);
                    
                    currentZone = zone;
                    history.push(currentState);
                    btnBack.disabled = false;
                }
            });
        });

        // Fonctionnement du bouton retour
        btnBack.addEventListener('click', () => {
            if (isAnimating || history.length === 0) return;
            
            // Retire la dernière action de l'historique
            const lastState = history.pop();
            const lastZone = document.getElementById(lastState.zoneId);
            
            // Éteint la dernière zone allumée
            if (lastZone) lastZone.classList.remove('active');
            
            // Reconstruit les lignes
            linesGroup.innerHTML = '';
            
            if (history.length === 0) {
                currentZone = null;
                btnBack.disabled = true;
            } else {
                // Définit la nouvelle "zone actuelle"
                const previousState = history[history.length - 1];
                currentZone = document.getElementById(previousState.zoneId);
                
                // Redessine les lignes entre les zones restantes
                for(let i = 0; i < history.length - 1; i++) {
                    const z1 = document.getElementById(history[i].zoneId);
                    const z2 = document.getElementById(history[i+1].zoneId);
                    drawLine(getCenter(z1), getCenter(z2));
                }
            }
        });

        // Recalcule les lignes si on redimensionne la fenêtre
        window.addEventListener('resize', () => {
            linesGroup.innerHTML = '';
            for(let i = 0; i < history.length - 1; i++) {
                const z1 = document.getElementById(history[i].zoneId);
                const z2 = document.getElementById(history[i+1].zoneId);
                drawLine(getCenter(z1), getCenter(z2));
            }
        });
    </script>
</body>
</html>
