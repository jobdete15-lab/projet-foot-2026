<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Logistique - Arena PC 2026</title>
    <style>
        :root {
            --bleu: #00d2ff; --vert: #39ff14; --rose: #ff007f;
            --pelouse1: #0a2412; --pelouse2: #0d2d16; --ligne: rgba(255,255,255,0.4);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #020503; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* === ÉCRAN DE CONNEXION === */
        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { 
            background: rgba(10, 10, 10, 0.9); padding: 50px 40px; border-radius: 15px; 
            border: 1px solid var(--vert); text-align: center; box-shadow: 0 10px 40px rgba(57, 255, 20, 0.15); width: 400px;
        }
        input { 
            display: block; margin: 20px auto; padding: 15px; border-radius: 8px; border: 1px solid #333; 
            width: 80%; background: #000; color: white; text-align: center; font-size: 1.1rem; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--vert); box-shadow: 0 0 10px rgba(57,255,20,0.3); }
        .btn-login { 
            background: var(--vert); color: #000; font-weight: bold; padding: 15px 30px; margin-top: 15px;
            border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; width: 88%; font-size: 1.1rem; transition: 0.3s;
        }
        .btn-login:hover { box-shadow: 0 0 20px rgba(57, 255, 20, 0.5); transform: scale(1.05); }

        /* === HEADER ET MAILLOTS PRO === */
        .header { text-align: center; padding: 20px; width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 2.5rem; letter-spacing: 3px; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .maillot-container { display: flex; gap: 40px; }
        .jersey { display: flex; flex-direction: column; align-items: center; }
        .jersey-svg { width: 70px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)); transition: 0.3s; }
        .jersey:hover .jersey-svg { transform: translateY(-5px); }
        .jersey span { font-size: 0.9rem; font-weight: 800; margin-top: 8px; color: white; opacity: 0.9; letter-spacing: 1px; }

        /* === LE STADE (HORIZONTAL POUR PC) === */
        .stade-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; padding: 20px; box-sizing: border-box; }
        .stade {
            position: relative; width: 100%; max-width: 1100px; height: 550px;
            background: repeating-linear-gradient(90deg, var(--pelouse1) 0px, var(--pelouse1) 50px, var(--pelouse2) 50px, var(--pelouse2) 100px);
            border: 3px solid #555; border-radius: 10px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9) inset, 0 10px 30px rgba(0,0,0,0.6); overflow: hidden; transition: 1s;
        }
        .stade.victory { box-shadow: 0 0 60px var(--vert), 0 20px 50px rgba(0,0,0,0.9) inset; border-color: var(--vert); }

        /* Lignes du terrain */
        .stade::before { content: ''; position: absolute; inset: 15px; border: 2px solid var(--ligne); pointer-events: none; }
        .mid-line { position: absolute; left: 50%; top: 15px; bottom: 15px; width: 2px; background: var(--ligne); pointer-events: none; transform: translateX(-50%); }
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; border: 2px solid var(--ligne); border-radius: 50%; pointer-events: none; }
        .center-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 6px; height: 6px; background: var(--ligne); border-radius: 50%; pointer-events: none; }
        
        .surface { position: absolute; top: 50%; transform: translateY(-50%); width: 150px; height: 250px; border: 2px solid var(--ligne); pointer-events: none; }
        .surface-left { left: 15px; border-left: none; }
        .surface-right { right: 15px; border-right: none; }

        /* === BALLONS / ORBES === */
        #game-content { display: flex; width: 100%; height: 100%; position: relative; z-index: 10; }
        .colonne { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; padding: 20px 0; }

        .obj-row { display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; transition: 0.3s; }
        .obj-row:hover .ball-3d { transform: scale(1.05); box-shadow: 0 10px 25px rgba(0,0,0,0.9); }

        /* Ballon 3D plus grand avec le texte dedans */
        .ball-3d {
            width: 110px; height: 110px; 
            background: radial-gradient(circle at 35% 35%, #444, #111);
            border-radius: 50%; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.8), inset 0 -10px 20px rgba(0,0,0,0.6); 
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 800; color: #aaa; text-align: center;
            padding: 10px; box-sizing: border-box; line-height: 1.3;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 2px solid #555; position: relative;
        }
        
        /* Reflet de lumière sur la sphère */
        .ball-3d::after {
            content: ''; position: absolute; top: 5px; left: 15%; width: 70%; height: 25%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
            border-radius: 50%; pointer-events: none;
        }
        
        /* Ballons allumés */
        .active .ball-3d { color: white; transform: scale(1.1) !important; border: 2px solid white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .active.bleu .ball-3d { background: radial-gradient(circle at 35% 35%, #666, var(--bleu)); box-shadow: 0 0 30px var(--bleu), inset 0 -10px 20px rgba(0,0,0,0.4); }
        .active.vert .ball-3d { background: radial-gradient(circle at 35% 35%, #666, var(--vert)); box-shadow: 0 0 30px var(--vert), inset 0 -10px 20px rgba(0,0,0,0.4); }
        .active.rose .ball-3d { background: radial-gradient(circle at 35% 35%, #666, var(--rose)); box-shadow: 0 0 30px var(--rose), inset 0 -10px 20px rgba(0,0,0,0.4); }

        /* Feedback texte (Good work) */
        .feedback {
            position: absolute; top: -35px; color: white; font-weight: 900; font-size: 1rem; text-transform: uppercase;
