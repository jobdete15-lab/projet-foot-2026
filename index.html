<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Logistique - Collaboratif</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; padding: 20px; }
        
        /* Les Ballons */
        .ballon { width: 80px; height: 80px; background: #444; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; margin: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .ballon.active { background: #39ff14; color: black; box-shadow: 0 0 20px #39ff14; transform: scale(1.1); }

        /* Fenêtre de confirmation (Popup) */
        #popup-confirm { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 30px; border: 2px solid #39ff14; border-radius: 10px; z-index: 100; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .btn { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-oui { background: #39ff14; color: black; }
        .btn-non { background: #ff4444; color: white; }

        /* Zone de Notes */
        .notes-section { margin-top: 50px; background: #222; padding: 20px; border-radius: 10px; max-width: 500px; margin-left: auto; margin-right: auto; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; background: #000; color: white; border: 1px solid #555; padding: 10px; }
        
        /* Bouton Retour */
        .btn-retour { background: #ff9800; color: black; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>🌐 Terrain Partagé - FM 2026</h1>
    <p>Ce que vous cliquez ici s'allume chez tout le monde !</p>

    <div id="terrain">
        <div class="ballon" id="obj1" onclick="demanderValidation('obj1')">Obj 1</div>
        <div class="ballon" id="obj2" onclick="demanderValidation('obj2')">Obj 2</div>
        <div class="ballon" id="obj3" onclick="demanderValidation('obj3')">Obj 3</div>
    </div>

    <button class="btn-retour" onclick="annulerDernier()">↩️ Retour (Annuler le dernier)</button>

    <div class="notes-section">
        <h3>📝 Notes de l'équipe</h3>
        <textarea id="boite-note" placeholder="Écrivez un commentaire ici..."></textarea>
        <br>
        <button class="btn btn-oui" onclick="sauvegarderNote()">Envoyer la note</button>
        <p id="affichage-note" style="color: #aaa; font-style: italic; margin-top: 15px;">Aucune note pour le moment.</p>
    </div>

    <div id="popup-confirm">
        <h3>Êtes-vous sûr de valider cet objectif ?</h3>
        <button class="btn btn-oui" onclick="confirmerValidation()">Oui</button>
        <button class="btn btn-non" onclick="fermerPopup()">Non</button>
    </div>

    <script>
        // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCJGFiEeRAa7Kar7YYilrtxirQbG5Yxo4E",
  authDomain: "projet-2026-be8d4.firebaseapp.com",
  databaseURL: "https://projet-2026-be8d4-default-rtdb.firebaseio.com",
  projectId: "projet-2026-be8d4",
  storageBucket: "projet-2026-be8d4.firebasestorage.app",
  messagingSenderId: "487136771744",
  appId: "1:487136771744:web:94f9efededb4038b1353c5"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
        // Remplace tout ce bloc par celui donné par Firebase à l'étape 3
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "TON_PROJET.firebaseapp.com",
            databaseURL: "https://TON_PROJET-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "TON_PROJET",
            storageBucket: "TON_PROJET.appspot.com",
            messagingSenderId: "TON_ID",
            appId: "TON_APP_ID"
        };
        
        // Initialisation de Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Variables pour gérer la popup
        let ballonEnAttente = null;

        // 1. Demander confirmation avant d'allumer
        function demanderValidation(idBallon) {
            ballonEnAttente = idBallon;
            document.getElementById('popup-confirm').style.display = 'block';
        }

        function fermerPopup() {
            document.getElementById('popup-confirm').style.display = 'none';
            ballonEnAttente = null;
        }

        // 2. Confirmer et envoyer à Firebase
        function confirmerValidation() {
            if (ballonEnAttente) {
                // Enregistre l'état "vrai" (allumé) et l'heure (pour savoir lequel est le dernier)
                db.ref('objectifs/' + ballonEnAttente).set({
                    allume: true,
                    timestamp: Date.now()
                });
                fermerPopup();
            }
        }

        // 3. Écouter les changements en TEMPS RÉEL
        // Dès qu'un PC change une donnée, Firebase prévient cette fonction
        db.ref('objectifs').on('value', (snapshot) => {
            const donnees = snapshot.val();
            
            // On réinitialise tous les ballons
            document.querySelectorAll('.ballon').forEach(b => b.classList.remove('active'));

            if (donnees) {
                // On allume ceux qui sont dans la base de données
                for (const [id, info] of Object.entries(donnees)) {
                    if (info.allume) {
                        document.getElementById(id).classList.add('active');
                    }
                }
            }
        });

        // 4. Bouton Retour (Annuler le dernier validé)
        function annulerDernier() {
            db.ref('objectifs').once('value').then((snapshot) => {
                const donnees = snapshot.val();
                if (donnees) {
                    // Trouver l'objectif avec le timestamp le plus récent
                    let dernierId = null;
                    let dernierTemps = 0;
                    
                    for (const [id, info] of Object.entries(donnees)) {
                        if (info.timestamp > dernierTemps) {
                            dernierTemps = info.timestamp;
                            dernierId = id;
                        }
                    }

                    // Supprimer ce dernier objectif
                    if (dernierId) {
                        db.ref('objectifs/' + dernierId).remove();
                    }
                }
            });
        }

        // 5. Gestion des notes collaboratives
        function sauvegarderNote() {
            const texte = document.getElementById('boite-note').value;
            db.ref('note_equipe').set(texte);
            document.getElementById('boite-note').value = ''; // Vide la case
        }

        // Écouter les notes en temps réel
        db.ref('note_equipe').on('value', (snapshot) => {
            const note = snapshot.val();
            if(note) {
                document.getElementById('affichage-note').innerText = note;
            }
        });

    </script>
</body>
</html>
