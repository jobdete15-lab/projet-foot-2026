<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Logistique - Arena Pro 2026</title>
    <style>
        :root {
            --bleu: #00d2ff; --vert: #39ff14; --rose: #ff007f;
            --pelouse: #0a2412; --ligne: rgba(255,255,255,0.2);
        }

        body { font-family: 'Lexend', sans-serif; background: #020503; color: white; margin: 0; padding-bottom: 60px; overflow-x: hidden; }

        /* === CONNEXION ADMIN === */
        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #111 0%, #000 100%); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { 
            background: rgba(20, 20, 20, 0.9); padding: 40px; border-radius: 20px; 
            border: 1px solid var(--vert); text-align: center; backdrop-filter: blur(10px);
        }
        input { 
            display: block; margin: 15px auto; padding: 12px; border-radius: 8px; border: 1px solid #333; 
            width: 250px; background: #000; color: white; text-align: center; font-size: 1rem; 
        }
        .btn-login { 
            background: var(--vert); color: #000; font-weight: bold; padding: 14px 30px; 
            border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; 
        }

        /* === HEADER & MAILLOTS PRO === */
        .header { text-align: center; padding: 25px 10px; }
        .maillot-container { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        
        .jersey {
            width: 60px; display: flex; flex-direction: column; align-items: center;
        }
        .jersey-svg { width: 50px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
        .jersey span { font-size: 0.7rem; font-weight: 800; margin-top: 5px; opacity: 0.8; }

        /* === LE STADE ARENA PRO === */
        .stade {
            position: relative; width: 92%; max-width: 450px; margin: auto;
            background: repeating-linear-gradient(0deg, #0a2412 0px, #0a2412 40px, #0d2d16 40px, #0d2d16 80px);
            border: 3px solid #333; border-radius: 10px; padding: 50px 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); overflow: hidden;
        }

        /* Lignes de jeu */
        .stade::before { content: ''; position: absolute; inset: 10px; border: 1px solid var(--ligne); pointer-events: none; }
        .mid-line { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: var(--ligne); }
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border: 1px solid var(--ligne); border-radius: 50%; }
        .cage { position: absolute; left: 50%; transform: translateX(-50%); width: 100px; height: 15px; border: 2px solid white; background: rgba(255,255,255,0.1); }
        .cage-top { top: 0; border-top: none; }
        .cage-bot { bottom: 0; border-bottom: none; }

        /* === BALLONS & OBJECTIFS === */
        .obj-row { 
            display: flex; align-items: center; margin: 35px 0; cursor: pointer; position: relative; z-index: 10;
            transition: 0.3s;
        }
        .obj-row:nth-child(even) { flex-direction: row-reverse; text-align: right; }

        .ball-3d {
            width: 40px; height: 40px; background: radial-gradient(circle at 30% 30%, #444, #111);
            border-radius: 50%; box-shadow: 0 5px 10px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }

        /* Couleurs Allumées */
        .active.bleu .ball-3d { background: radial-gradient(circle at 30% 30%, #80eaff, var(--bleu)); box-shadow: 0 0 20px var(--bleu); }
        .active.vert .ball-3d { background: radial-gradient(circle at 30% 30%, #afff9d, var(--vert)); box-shadow: 0 0 20px var(--vert); }
        .active.rose .ball-3d { background: radial-gradient(circle at 30% 30%, #ff80bf, var(--rose)); box-shadow: 0 0 20px var(--rose); }

        .label { margin: 0 15px; font-weight: 600; font-size: 0.85rem; color: #666; transition: 0.4s; }
        .active .label { color: white; }

        /* Animation Feedback */
        .feedback {
            position: absolute; color: var(--vert); font-weight: 900; font-size: 0.7rem;
            text-transform: uppercase; white-space: nowrap; animation: floatUp 1s forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-30px); }
        }

        /* Contrôles */
        .reset-btn { position: fixed; bottom: 15px; right: 15px; background: rgba(255,0,0,0.2); border: 1px solid red; color: red; padding: 8px 12px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>ARENA 2026</h2>
            <input type="text" id="user" placeholder="Login Admin">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn-login" onclick="checkLogin()">Entrer sur le terrain</button>
            <p id="error" style="color:red; font-size:0.8rem; margin-top:10px;"></p>
        </div>
    </div>

    <div class="header">
        <h1>OBJECT
