<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Logistique - Arena Pro Collaborative</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bleu: #00d2ff; --vert: #39ff14; --rose: #ff007f;
            --pelouse1: #0a2412; --pelouse2: #0d2d16; --ligne: rgba(255,255,255,0.4);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #020503; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; padding-bottom: 50px; }

        /* === ÉCRAN DE CONNEXION === */
        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: rgba(10, 10, 10, 0.9); padding: 40px 20px; border-radius: 15px; border: 1px solid var(--vert); text-align: center; box-shadow: 0 10px 40px rgba(57, 255, 20, 0.15); width: 85%; max-width: 400px; }
        input { display: block; margin: 15px auto; padding: 12px; border-radius: 8px; border: 1px solid #333; width: 85%; background: #000; color: white; text-align: center; font-size: 1rem; }
        .btn-login { background: var(--vert); color: #000; font-weight: bold; padding: 15px 30px; margin-top: 15px; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; width: 90%; font-size: 1.1rem; transition: 0.3s; }
        .btn-login:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--vert); }

        /* === HEADER === */
        .header { text-align: center; padding: 20px; width: 100%; max-width: 1000px; }
        h1 { margin: 0 0 5px 0; font-size: 2rem; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .live-badge { color: #ff4444; font-size: 0.9rem; font-weight: bold; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        .maillot-container { display: flex; justify-content: center; gap: 30px; }
        .jersey { display: flex; flex-direction: column; align-items: center; }
        .jersey-svg { width: 60px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.6)); }
        .jersey span { font-size: 0.8rem; font-weight: 800; margin-top: 5px; color: white; opacity: 0.9; }

        /* === LE STADE (HORIZONTAL AVEC CAGES) === */
        .stade-container { width: 95%; max-width: 1000px; margin: 20px auto; }
        .stade {
            position: relative; width: 100%; height: 500px;
            background: repeating-linear-gradient(90deg, var(--pelouse1) 0px, var(--pelouse1) 50px, var(--pelouse2) 50px, var(--pelouse2) 100px);
            border: 3px solid #555; border-radius: 10px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9) inset, 0 10px 30px rgba(0,0,0,0.6); overflow: hidden; transition: 1s;
        }
        .stade.victory { box-shadow: 0 0 60px var(--vert), 0 20px 50px rgba(0,0,0,0.9) inset; border-color: var(--vert); }

        /* Lignes du terrain */
        .stade::before { content: ''; position: absolute; inset: 15px; border: 2px solid var(--ligne); pointer-events: none; }
        .mid-line { position: absolute; left: 50%; top: 15px; bottom: 15px; width: 2px; background: var(--ligne); pointer-events: none; transform: translateX(-50%); }
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; border: 2px solid var(--ligne); border-radius: 50%; pointer-events: none; }
        
        /* Cages et surfaces */
        .surface { position: absolute; top: 50%; transform: translateY(-50%); width: 120px; height: 220px; border: 2px solid var(--ligne); pointer-events: none; }
        .surface-left { left: 15px; border-left: none; }
        .surface-right { right: 15px; border-right: none; }
        
        .cage { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 100px; border: 3px solid white; background: rgba(255,255,255,0.1); pointer-events: none; }
        .cage-left { left: -3px; border-left: none; }
        .cage-right { right: -3px; border-right: none; }

        /* === BALLONS 3D (AVEC TEXTE DEDANS) === */
        #game-content { display: flex; width: 100%; height: 100%; position: relative; z-index: 10; align-items: center; justify-content: space-evenly; }
        .colonne { display: flex; flex-direction: column; gap: 30px; }

        .obj-row { position: relative; cursor: pointer; transition: 0.3s; }
        .obj-row:hover .ball-3d { transform: scale(1.05); box-shadow: 0 10px 25px rgba(0,0,0,0.9); }

        .ball-3d {
            width: 100px; height: 100px; 
            background: radial-gradient(circle at 35% 35%, #444, #111);
            border-radius: 50%; border: 2px solid #555;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8), inset 0 -10px 20px rgba(0,0,0,0.6); 
            display: flex; align-items: center; justify-content: center; text-align: center;
            font-size: 0.8rem; font-weight: bold; color: #aaa; padding: 10px; box-sizing: border-box; line-height: 1.2;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative;
        }
        .ball-3d::after { content: ''; position: absolute; top: 5px; left: 15%; width: 70%; height: 25%; background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent); border-radius: 50%; pointer-events: none; }
        
        .active .ball-3d { color: white; transform: scale(1.1) !important; border: 2px solid white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .active.bleu .ball-3d { background: radial-gradient(circle at 35% 35%, #666, var(--bleu)); box-shadow: 0 0 30px var(--bleu), inset 0 -10px 20px rgba(0,0,0,0.4); }
        .active.vert .ball-3d { background: radial-gradient(circle at 35% 35%, #666, var(--vert)); box-shadow: 0 0 30px var(--vert), inset 0 -10px 20px rgba(0,0,0,0.4); }
        .active.rose .ball-3d { background: radial-gradient(circle at 35% 35%, #666, var(--rose)); box-shadow: 0 0 30px var(--rose), inset 0 -10px 20px rgba(0,0,0,0.4); }

        /* Animation des mots d'encouragement */
        .feedback {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            color: white; font-weight: 900; font-size: 1rem; text-transform: uppercase;
            animation: floatUp 1.2s forwards; background: rgba(0,0,0,0.9); padding: 5px 12px; border-radius: 6px; 
            border: 1px solid rgba(255,255,255,0.3); white-space: nowrap; pointer-events: none; z-index: 20;
        }
        @keyframes floatUp { 0% { opacity: 0; transform: translate(-50%, 0) scale(0.8); } 20% { opacity: 1; transform: translate(-50%, -20px) scale(1.1); } 100% { opacity: 0; transform: translate(-50%, -60px) scale(1); } }

        /* === POPUP === */
        #popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; backdrop-filter: blur(4px); }
        .popup-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border: 2px solid var(--vert); border-radius: 12px; text-align: center; z-index: 1501; width: 80%; max-width: 300px; box-shadow: 0 0 30px rgba(57, 255, 20, 0.3); }
        .popup-box h3 { margin-top: 0; font-size: 1.1rem; }
        .btn-group { display: flex; justify-content: space-around; margin-top: 20px; }
        .btn-pop { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-oui { background: var(--vert); color: black; }
        .btn-non { background: #ff4444; color: white; }

        /* === ZONE COLLABORATIVE (LE CHAT & RETOUR) === */
        .collab-section { width: 95%; max-width: 1000px; display: flex; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .collab-section { flex-direction: column; } }
        
        .chat-box { flex: 2; background: #111; border: 1px solid #333; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; height: 250px; }
        .chat-box h3 { margin: 0 0 10px 0; color: var(--bleu); }
        .messages { flex: 1; background: #000; border: 1px solid #222; border-radius: 6px; padding: 10px; overflow-y: auto; margin-bottom: 10px; font-size: 0.9rem; }
        .msg-line { margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .msg-name { color: var(--vert); font-weight: bold; margin-right: 5px; }
        
        .chat-inputs { display: flex; gap: 5px; }
        .chat-inputs input { margin: 0; padding: 10px; border-radius: 5px; font-size: 0.9rem; }
        #input-name { flex: 1; max-width: 100px; }
        #input-text { flex: 3; }
        .btn-envoyer { background: var(--bleu); color: black; font-weight: bold; border: none; border-radius: 5px; padding: 0 15px; cursor: pointer; }

        .actions { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .btn-retour { background: #ff9800; color: black; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 999; display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--vert); margin-top:0;">FM ARENA 2026</h2>
            <p style="font-size:0.8rem; color:#aaa;">Connexion Équipe Sécurisée</p>
            <input type="text" id="user" placeholder="Identifiant (admin)">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn-login" onclick="checkLogin()">Entrer sur le terrain</button>
            <p id="error" style="color:#ff4444; font-size:0.9rem; margin-top:15px; font-weight:bold;"></p>
        </div>
    </div>

    <div id="popup-overlay"></div>
    <div class="popup-box" id="popup-confirm">
        <h3>Êtes-vous sûr de valider cet objectif ?</h3>
        <div class="btn-group">
            <button class="btn-pop btn-oui" onclick="confirmerValidation()">Oui</button>
            <button class="btn-pop btn-non" onclick="fermerPopup()">Non</button>
        </div>
    </div>

    <div class="header">
        <h1>OBJECTIF 2026</h1>
        <div class="live-badge">🔴 En Direct avec l'équipe</div>
        <div class="maillot-container">
            <div class="jersey"><svg class="jersey-svg" viewBox="0 0 100 100"><path d="M20 30 L35 15 L65 15 L80 30 L80 40 L65 40 L65 85 L35 85 L35 40 L20 40 Z" fill="#00d2ff"/></svg><span style="color:var(--bleu)">PEOPLE</span></div>
            <div class="jersey"><svg class="jersey-svg" viewBox="0 0 100 100"><path d="M20 30 L35 15 L65 15 L80 30 L80 40 L65 40 L65 85 L35 85 L35 40 L20 40 Z" fill="#39ff14"/></svg><span style="color:var(--vert)">ENVIRON.</span></div>
            <div class="jersey"><svg class="jersey-svg" viewBox="0 0 100 100"><path d="M20 30 L35 15 L65 15 L80 30 L80 40 L65 40 L65 85 L35 85 L35 40 L20 40 Z" fill="#ff007f"/></svg><span style="color:var(--rose)">VIVRE</span></div>
        </div>
    </div>

    <div class="stade-container">
        <div class="stade" id="arena">
            <div class="surface surface-left"></div>
            <div class="mid-line"></div>
            <div class="center-circle"></div>
            <div class="surface surface-right"></div>
            <div class="cage cage-left"></div>
            <div class="cage cage-right"></div>
            
            <svg id="svg-lines" style="position:absolute; inset:0; width:100%; height:100%; z-index:1; pointer-events:none;"></svg>
            
            <div id="game-content">
                <div class="colonne" id="col-defense"></div>
                <div class="colonne" id="col-milieu"></div>
                <div class="colonne" id="col-attaque"></div>
            </div>
        </div>
    </div>

    <div class="collab-section">
        <div class="chat-box">
            <h3>💬 Chat d'Équipe</h3>
            <div class="messages" id="chat-messages">Chargement des messages...</div>
            <div class="chat-inputs">
                <input type="text" id="input-name" placeholder="Prénom">
                <input type="text" id="input-text" placeholder="Tapez votre message...">
                <button class="btn-envoyer" onclick="envoyerMessage()">Envoyer</button>
            </div>
        </div>
        <div class="actions">
            <button class="btn-retour" onclick="annulerDerniereAction()">↩️ Annuler la dernière passe</button>
        </div>
    </div>

    <canvas id="confetti"></canvas>

    <script>
        // === CLÉS FIREBASE ===
        const firebaseConfig = {
            apiKey: "AIzaSyCJGFiEeRAa7Kar7YYilrtxirQbG5Yxo4E",
            authDomain: "projet-2026-be8d4.firebaseapp.com",
            databaseURL: "https://projet-2026-be8d4-default-rtdb.firebaseio.com",
            projectId: "projet-2026-be8d4",
            storageBucket: "projet-2026-be8d4.firebasestorage.app",
            messagingSenderId: "487136771744",
            appId: "1:487136771744:web:94f9efededb4038b1353c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // === AUDIOS ===
        const sonValidation = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        const sonVictoire = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

        const objectives = [
            { id: 1, label: "Formation", zone: "bleu", col: "col-defense" },
            { id: 2, label: "Parité H/F", zone: "bleu", col: "col-defense" },
            { id: 3, label: "Mentorat", zone: "bleu", col: "col-defense" },
            { id: 4, label: "Carbone -20%", zone: "vert", col: "col-milieu" },
            { id: 5, label: "Électrique", zone: "vert", col: "col-milieu" },
            { id: 6, label: "Zéro Déchet", zone: "vert", col: "col-milieu" },
            { id: 7, label: "Zéro Accident", zone: "rose", col: "col-attaque" },
            { id: 8, label: "Sport", zone: "rose", col: "col-attaque" },
            { id: 9, label: "Inclusion", zone: "rose", col: "col-attaque" }
        ];

        let state = []; 
        let ballonEnAttente = null; 
        let aGagne = false;

        function checkLogin() {
            if(document.getElementById('user').value.trim() === 'admin' && document.getElementById('pass').value.trim() === 'admin') {
                document.getElementById('login-screen').style.display = 'none';
                lancerJeu();
            } else { document.getElementById('error').innerText = "Identifiants incorrects."; }
        }

        function lancerJeu() {
            objectives.forEach(obj => {
                const row = document.createElement('div');
                row.className = `obj-row ${obj.zone}`;
                row.id = `ballon-${obj.id}`;
                row.innerHTML = `<div class="ball-3d">${obj.label}</div>`;
                row.onclick = () => demanderValidation(obj.id);
                document.getElementById(obj.col).appendChild(row);
            });

            // Écoute des ballons
            db.ref('fm_2026_objectifs').on('value', (snapshot) => {
                const data = snapshot.val();
                state = []; 
                document.querySelectorAll('.obj-row').forEach(el => el.classList.remove('active'));
                document.getElementById('arena').classList.remove('victory');

                if (data) {
                    const sorted = Object.keys(data).map(k => ({ id: parseInt(k), time: data[k].timestamp })).sort((a,b) => a.time - b.time);
                    sorted.forEach(item => {
                        state.push(item.id);
                        document.getElementById(`ballon-${item.id}`).classList.add('active');
                    });
                }
                drawLines();

                // Victoire Finale
                if(state.length === objectives.length && !aGagne) { 
                    document.getElementById('arena').classList.add('victory');
                    sonVictoire.play().catch(e=>{});
                    launchConfetti();
                    aGagne = true;
                } else if (state.length < objectives.length) {
                    aGagne = false; // Réinitialise si on annule un but
                }
            });

            // Écoute du Chat d'équipe
            db.ref('fm_2026_chat_v2').on('value', (snapshot) => {
                const data = snapshot.val();
                const box = document.getElementById('chat-messages');
                box.innerHTML = '';
                if(data) {
                    const msgs = Object.values(data).sort((a,b) => a.time - b.time);
                    msgs.forEach(m => {
                        box.innerHTML += `<div class="msg-line"><span class="msg-name">${m.name} :</span><span>${m.text}</span></div>`;
                    });
                    box.scrollTop = box.scrollHeight; // Descend tout en bas
                } else {
                    box.innerHTML = "<em>Soyez le premier à envoyer un message !</em>";
                }
            });
        }

        function demanderValidation(id) {
            if(state.includes(id)) return;
            ballonEnAttente = id;
            document.getElementById('popup-overlay').style.display = 'block';
            document.getElementById('popup-confirm').style.display = 'block';
        }

        function fermerPopup() {
            ballonEnAttente = null;
            document.getElementById('popup-overlay').style.display = 'none';
            document.getElementById('popup-confirm').style.display = 'none';
        }

        function confirmerValidation() {
            if(ballonEnAttente) {
                // Animation de texte ("Excellent!")
                const mots = ["Excellent !", "Continuez comme ça !", "Beau travail !", "Parfait !"];
                const motChoisi = mots[Math.floor(Math.random() * mots.length)];
                const f = document.createElement('div');
                f.className = 'feedback'; f.innerText = motChoisi;
                document.getElementById(`ballon-${ballonEnAttente}`).appendChild(f);
                setTimeout(() => f.remove(), 1200);

                // Son de validation
                sonValidation.currentTime = 0;
                sonValidation.play().catch(e=>{});

                // Envoi à la base de données
                db.ref('fm_2026_objectifs/' + ballonEnAttente).set({ timestamp: Date.now() });
                fermerPopup();
            }
        }

        function annulerDerniereAction() {
            db.ref('fm_2026_objectifs').once('value').then((snapshot) => {
                const data = snapshot.val();
                if(data) {
                    let dernierId = null; let maxTime = 0;
                    for (const id in data) { if(data[id].timestamp > maxTime) { maxTime = data[id].timestamp; dernierId = id; } }
                    if(dernierId) { db.ref('fm_2026_objectifs/' + dernierId).remove(); }
                }
            });
        }

        function envoyerMessage() {
            const nom = document.getElementById('input-name').value.trim() || "Un(e) collègue";
            const txt = document.getElementById('input-text').value.trim();
            if(txt !== "") { 
                db.ref('fm_2026_chat_v2').push({ name: nom, text: txt, time: Date.now() }); 
                document.getElementById('input-text').value = ""; 
            }
        }

        function drawLines() {
            const svg = document.getElementById('svg-lines');
            svg.innerHTML = '';
            for(let i=0; i < state.length - 1; i++) {
                const b1 = document.getElementById(`ballon-${state[i]}`).querySelector('.ball-3d').getBoundingClientRect();
                const b2 = document.getElementById(`ballon-${state[i+1]}`).querySelector('.ball-3d').getBoundingClientRect();
                const rT = document.getElementById('arena').getBoundingClientRect();
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", b1.left - rT.left + (b1.width/2)); line.setAttribute("y1", b1.top - rT.top + (b1.height/2));
                line.setAttribute("x2", b2.left - rT.left + (b2.width/2)); line.setAttribute("y2", b2.top - rT.top + (b2.height/2));
                line.setAttribute("stroke", "rgba(255,255,255,0.7)"); line.setAttribute("stroke-width", "2.5"); line.setAttribute("stroke-dasharray", "6,6");
                svg.appendChild(line);
            }
        }
        window.addEventListener('resize', drawLines);

        function launchConfetti() {
            const canvas = document.getElementById('confetti'); canvas.style.display = 'block';
            const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let p = []; for(let i=0; i<200; i++) p.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height-canvas.height, w: Math.random()*10+5, d: Math.random()*10, c: `hsl(${Math.random()*360},100%,50%)` });
            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                p.forEach(part => { ctx.fillStyle = part.c; ctx.fillRect(part.x, part.y, part.w, part.w); part.y += Math.cos(part.d) + 3; part.x += Math.sin(0); if(part.y > canvas.height) part.y = -10; });
                requestAnimationFrame(draw);
            }
            draw(); setTimeout(() => { canvas.style.display = 'none'; }, 8000);
        }
    </script>
</body>
</html>
