<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Logistique - Arena 2026</title>
    <style>
        :root {
            --bleu: #00f3ff; --vert: #39ff14; --rose: #ff007f;
            --bg: #050505;
        }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* === ECRAN DE CONNEXION === */
        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { background: #111; padding: 30px; border: 2px solid var(--vert); border-radius: 15px; text-align: center; }
        input { display: block; margin: 10px auto; padding: 10px; border-radius: 5px; border: none; width: 200px; }
        button.btn-login { background: var(--vert); color: black; font-weight: bold; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }

        /* === HEADER & MAILLOTS === */
        .header { text-align: center; padding: 20px; }
        .maillot-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .maillot { font-size: 2rem; position: relative; display: flex; flex-direction: column; align-items: center; }
        .maillot span { font-size: 0.8rem; margin-top: 5px; font-weight: bold; }
        
        /* === LE STADE === */
        .stade {
            position: relative; width: 95%; max-width: 500px; margin: auto;
            background: linear-gradient(180deg, #0a1c10 0%, #040d07 100%);
            border: 3px solid rgba(255,255,255,0.2); border-radius: 20px;
            padding: 40px 10px; transition: all 1s;
        }
        .stade.victory { box-shadow: 0 0 50px var(--vert); border-color: var(--vert); background: #111; }
        
        /* Ballons & Points */
        .ligne-objectif { display: flex; align-items: center; margin: 25px 0; cursor: pointer; position: relative; z-index: 10; }
        .ligne-objectif:nth-child(even) { flex-direction: row-reverse; }
        
        .ballon-icon {
            width: 45px; height: 45px; background: url('https://cdn-icons-png.flaticon.com/512/888/888846.png') no-repeat center;
            background-size: contain; filter: grayscale(1) brightness(0.5); transition: 0.4s;
        }
        .active .ballon-icon { filter: grayscale(0) brightness(1.2); transform: rotate(360deg); }
        .active.bleu .ballon-icon { filter: drop-shadow(0 0 10px var(--bleu)); }
        .active.vert .ballon-icon { filter: drop-shadow(0 0 10px var(--vert)); }
        .active.rose .ballon-icon { filter: drop-shadow(0 0 10px var(--rose)); }

        .nom-obj { margin: 0 15px; font-weight: bold; color: #444; font-size: 0.9rem; transition: 0.4s; }
        .active .nom-obj { color: white; text-shadow: 0 0 5px white; }

        /* Boutons de contrôle */
        .controls { position: fixed; bottom: 10px; right: 10px; display: flex; gap: 10px; z-index: 100; }
        .btn-ui { padding: 8px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.7rem; opacity: 0.7; }

        /* Confettis */
        #canvas-confetti { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Accès Admin 2026</h2>
            <input type="text" id="user" placeholder="Utilisateur">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn-login" onclick="checkLogin()">CONNEXION</button>
            <p id="error" style="color:red; font-size:0.8rem; margin-top:10px;"></p>
        </div>
    </div>

    <div class="header">
        <h1>🏆 ARENA FM 2026</h1>
        <div class="maillot-container">
            <div class="maillot" style="color: var(--bleu);">👕<span style="position:absolute; top:8px; color:black; font-size:10px;">👥</span><span>PEOPLE</span></div>
            <div class="maillot" style="color: var(--vert);">👕<span style="position:absolute; top:8px; color:black; font-size:10px;">🌱</span><span>ENVIRON.</span></div>
            <div class="maillot" style="color: var(--rose);">👕<span style="position:absolute; top:8px; color:black; font-size:10px;">🤝</span><span>VIVRE</span></div>
        </div>
    </div>

    <div class="stade" id="arena">
        <svg id="svg-passes" style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none;"></svg>
        
        <div id="list-objectifs">
            </div>
    </div>

    <div class="controls">
        <button class="btn-ui" onclick="resetApp()" style="background:#ff4444; color:white;">Réinitialiser</button>
    </div>

    <canvas id="canvas-confetti"></canvas>

    <audio id="sound-ting" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <audio id="sound-victory" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <script>
        const objectifs = [
            { id: 1, label: "Formation Continue", zone: "bleu" },
            { id: 2, label: "Parité Homme/Femme", zone: "bleu" },
            { id: 3, label: "Mentorat interne", zone: "bleu" },
            { id: 4, label: "Bilan Carbone -20%", zone: "vert" },
            { id: 5, label: "Camions Électriques", zone: "vert" },
            { id: 6, label: "Zéro Plastique", zone: "vert" },
            { id: 7, label: "Objectif Zéro Accident", zone: "rose" },
            { id: 8, label: "Inclusion & Respect", zone: "rose" }
        ];

        let state = JSON.parse(localStorage.getItem('fm_2026_state')) || [];

        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'admin' && p === 'admin') {
                document.getElementById('login-screen').style.display = 'none';
                init();
            } else {
                document.getElementById('error').innerText = "Identifiants incorrects";
            }
        }

        function init() {
            const container = document.getElementById('list-objectifs');
            container.innerHTML = '';
            objectifs.forEach(obj => {
                const isActive = state.includes(obj.id);
                const div = document.createElement('div');
                div.className = `ligne-objectif ${obj.zone} ${isActive ? 'active' : ''}`;
                div.dataset.id = obj.id;
                div.innerHTML = `<div class="ballon-icon"></div><div class="nom-obj">${obj.label}</div>`;
                div.onclick = () => toggleObj(obj.id, div, obj.zone);
                container.appendChild(div);
            });
            drawPasses();
            checkVictory();
        }

        function toggleObj(id, el, zone) {
            if (state.includes(id)) return; 
            state.push(id);
            el.classList.add('active');
            localStorage.setItem('fm_2026_state', JSON.stringify(state));
            document.getElementById('sound-ting').play();
            drawPasses();
            checkVictory();
        }

        function drawPasses() {
            const svg = document.getElementById('svg-passes');
            svg.innerHTML = '';
            for (let i = 0; i < state.length - 1; i++) {
                const start = document.querySelector(`[data-id="${state[i]}"] .ballon-icon`);
                const end = document.querySelector(`[data-id="${state[i+1]}"] .ballon-icon`);
                if (start && end) {
                    const rS = start.getBoundingClientRect();
                    const rE = end.getBoundingClientRect();
                    const rT = document.getElementById('arena').getBoundingClientRect();
                    
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", rS.left - rT.left + 22);
                    line.setAttribute("y1", rS.top - rT.top + 22);
                    line.setAttribute("x2", rE.left - rT.left + 22);
                    line.setAttribute("y2", rE.top - rT.top + 22);
                    line.setAttribute("stroke", "white");
                    line.setAttribute("stroke-width", "2");
                    line.setAttribute("stroke-dasharray", "5,5");
                    svg.appendChild(line);
                }
            }
        }

        function checkVictory() {
            if (state.length === objectifs.length) {
                document.getElementById('arena').classList.add('victory');
                document.getElementById('sound-victory').play();
                startConfetti();
            }
        }

        function resetApp() {
            if(confirm("Réinitialiser tout l'avancement ?")) {
                state = [];
                localStorage.removeItem('fm_2026_state');
                location.reload();
            }
        }

        // --- Petit moteur de confettis ---
        function startConfetti() {
            const canvas = document.getElementById('canvas-confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];
            for(let i=0; i<100; i++) particles.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*5+2, d:Math.random()*10, c: `hsl(${Math.random()*360}, 100%, 50%)` });
            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                    p.y += Math.cos(p.d) + 1 + p.r/2; p.x += Math.sin(0);
                    if(p.y > canvas.height) p.y = -10;
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
