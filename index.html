<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Logistique - Arena Collaborative</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bleu: #00d2ff; --vert: #39ff14; --rose: #ff007f;
            --pelouse1: #0a2412; --pelouse2: #0d2d16; --ligne: rgba(255,255,255,0.3);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #020503; color: white; margin: 0; padding-bottom: 60px; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; }

        /* === ÉCRAN DE CONNEXION === */
        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: rgba(10, 10, 10, 0.9); padding: 40px 20px; border-radius: 15px; border: 1px solid var(--vert); text-align: center; box-shadow: 0 10px 30px rgba(57, 255, 20, 0.1); width: 85%; max-width: 350px; }
        input { display: block; margin: 15px auto; padding: 15px; border-radius: 8px; border: 1px solid #333; width: 80%; background: #000; color: white; text-align: center; font-size: 1rem; }
        .btn-login { background: var(--vert); color: #000; font-weight: bold; padding: 15px 30px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; width: 90%; font-size: 1rem; transition: 0.2s; }
        .btn-login:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--vert); }

        /* === HEADER ET MAILLOTS === */
        .header { text-align: center; padding: 20px 10px; width: 100%; max-width: 500px; }
        h1 { margin: 0 0 5px 0; font-size: 1.6rem; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .live-badge { color: #ff4444; font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .maillot-container { display: flex; justify-content: center; gap: 20px; }
        .jersey { display: flex; flex-direction: column; align-items: center; }
        .jersey-svg { width: 55px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.6)); }
        .jersey span { font-size: 0.75rem; font-weight: 800; margin-top: 5px; color: white; opacity: 0.9; }

        /* === LE STADE === */
        .stade {
            position: relative; width: 92%; max-width: 450px; margin: auto;
            background: repeating-linear-gradient(0deg, var(--pelouse1) 0px, var(--pelouse1) 40px, var(--pelouse2) 40px, var(--pelouse2) 80px);
            border: 2px solid #555; border-radius: 8px; padding: 50px 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9) inset, 0 0 20px rgba(0,0,0,0.5); overflow: hidden; transition: 1s;
        }
        .stade.victory { box-shadow: 0 0 50px var(--vert), 0 15px 40px rgba(0,0,0,0.9) inset; border-color: var(--vert); }

        .stade::before { content: ''; position: absolute; inset: 10px; border: 1px solid var(--ligne); pointer-events: none; }
        .mid-line { position: absolute; top: 50%; left: 10px; right: 10px; height: 1px; background: var(--ligne); pointer-events: none; }
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; border: 1px solid var(--ligne); border-radius: 50%; pointer-events: none; }
        
        /* === BALLONS ET OBJECTIFS === */
        #game-content { position: relative; z-index: 10; }
        .obj-row { display: flex; align-items: center; margin: 35px 0; cursor: pointer; transition: 0.3s; }
        .obj-row:nth-child(even) { flex-direction: row-reverse; text-align: right; }

        .ball-3d { width: 45px; height: 45px; background: radial-gradient(circle at 35% 35%, #666, #111); border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; transition: 0.5s; filter: grayscale(1); border: 1px solid #444; }
        .active .ball-3d { filter: grayscale(0); transform: scale(1.15) rotate(360deg); border: 1px solid white; }
        .active.bleu .ball-3d { background: radial-gradient(circle at 35% 35%, #fff, var(--bleu)); box-shadow: 0 0 25px var(--bleu); }
        .active.vert .ball-3d { background: radial-gradient(circle at 35% 35%, #fff, var(--vert)); box-shadow: 0 0 25px var(--vert); }
        .active.rose .ball-3d { background: radial-gradient(circle at 35% 35%, #fff, var(--rose)); box-shadow: 0 0 25px var(--rose); }

        .label { margin: 0 15px; font-weight: 700; font-size: 0.85rem; color: #888; transition: 0.4s; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; }
        .active .label { color: white; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        /* === FENÊTRE DE CONFIRMATION (POPUP) === */
        #popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; backdrop-filter: blur(4px); }
        .popup-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border: 2px solid var(--vert); border-radius: 12px; text-align: center; z-index: 1501; width: 80%; max-width: 300px; box-shadow: 0 0 30px rgba(57, 255, 20, 0.3); }
        .popup-box h3 { margin-top: 0; font-size: 1.1rem; }
        .btn-group { display: flex; justify-content: space-around; margin-top: 20px; }
        .btn-pop { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-oui { background: var(--vert); color: black; }
        .btn-non { background: #ff4444; color: white; }

        /* === ZONE COLLABORATIVE (NOTES & RETOUR) === */
        .collab-section { width: 92%; max-width: 450px; margin-top: 20px; background: #111; border: 1px solid #333; border-radius: 10px; padding: 15px; box-sizing: border-box; }
        .btn-retour { width: 100%; background: #ff9800; color: black; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; font-size: 0.9rem; }
        
        .notes-area { text-align: left; }
        .notes-area h3 { margin: 0 0 10px 0; font-size: 1rem; color: var(--bleu); }
        .notes-display { background: #000; border: 1px solid #222; padding: 10px; border-radius: 6px; min-height: 50px; font-size: 0.85rem; color: #ccc; margin-bottom: 10px; white-space: pre-wrap; }
        .notes-input-group { display: flex; gap: 5px; }
        .notes-input-group input { margin: 0; padding: 10px; flex: 1; border-radius: 5px; font-size: 0.8rem; }
        .btn-note { background: var(--bleu); border: none; border-radius: 5px; color: black; font-weight: bold; padding: 0 15px; cursor: pointer; }

        canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 999; display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--vert); margin-top:0;">FM ARENA 2026</h2>
            <p style="font-size:0.8rem; color:#aaa;">Connexion Équipe Sécurisée</p>
            <input type="text" id="user" placeholder="Identifiant (admin)">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn-login" onclick="checkLogin()">Entrer sur le terrain</button>
            <p id="error" style="color:#ff4444; font-size:0.9rem; margin-top:15px; font-weight:bold;"></p>
        </div>
    </div>

    <div id="popup-overlay"></div>
    <div class="popup-box" id="popup-confirm">
        <h3>Êtes-vous sûr de valider cet objectif ?</h3>
        <div class="btn-group">
            <button class="btn-pop btn-oui" onclick="confirmerValidation()">Oui</button>
            <button class="btn-pop btn-non" onclick="fermerPopup()">Non</button>
        </div>
    </div>

    <div class="header">
        <h1>OBJECTIF 2026</h1>
        <div class="live-badge">🔴 Multi-joueurs En Direct</div>
        <div class="maillot-container">
            <div class="jersey">
                <svg class="jersey-svg" viewBox="0 0 100 100"><path d="M20 30 L35 15 L65 15 L80 30 L80 40 L65 40 L65 85 L35 85 L35 40 L20 40 Z" fill="#00d2ff" stroke="rgba(255,255,255,0.5)" stroke-width="2"/><text x="50" y="60" font-size="22" text-anchor="middle" fill="white">👥</text></svg>
                <span style="color:var(--bleu)">PEOPLE</span>
            </div>
            <div class="jersey">
                <svg class="jersey-svg" viewBox="0 0 100 100"><path d="M20 30 L35 15 L65 15 L80 30 L80 40 L65 40 L65 85 L35 85 L35 40 L20 40 Z" fill="#39ff14" stroke="rgba(255,255,255,0.5)" stroke-width="2"/><text x="50" y="60" font-size="22" text-anchor="middle" fill="black">🌱</text></svg>
                <span style="color:var(--vert)">ENVIRON.</span>
            </div>
            <div class="jersey">
                <svg class="jersey-svg" viewBox="0 0 100 100"><path d="M20 30 L35 15 L65 15 L80 30 L80 40 L65 40 L65 85 L35 85 L35 40 L20 40 Z" fill="#ff007f" stroke="rgba(255,255,255,0.5)" stroke-width="2"/><text x="50" y="60" font-size="22" text-anchor="middle" fill="white">🤝</text></svg>
