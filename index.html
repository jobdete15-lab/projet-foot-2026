        :root {
            --bleu: #00d2ff; --vert: #a8ff14; --rose: #ff007f;

        }
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: white; margin: 0; padding-bottom: 60px; overflow-x: hidden; }

        /* === CONNEXION === */
        #login-screen {
            position: fixed; inset: 0; background: #111; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { 
            background: #222; padding: 40px; border-radius: 15px; 
            border: 2px solid white; text-align: center; width: 80%; max-width: 300px;
        }
        input { 
            display: block; margin: 15px auto; padding: 15px; border-radius: 8px; border: none; 
            width: 100%; box-sizing: border-box; text-align: center; font-size: 1.2rem; font-weight: bold;
        }
        .btn-login { 
            background: var(--pelouse1); color: white; font-weight: bold; padding: 15px 30px; 
            border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; width: 100%;
            font-size: 1.1rem; margin-top: 10px;
        }
