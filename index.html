<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Logistique - Arena 2026</title>
    <style>
        :root {
            --bleu: #00f3ff; --vert: #39ff14; --rose: #ff007f;
            --bg: #050505;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* === ECRAN DE CONNEXION === */
        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { background: #111; padding: 30px; border: 2px solid var(--vert); border-radius: 15px; text-align: center; box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); }
        input { display: block; margin: 15px auto; padding: 12px; border-radius: 5px; border: none; width: 220px; text-align: center; font-size: 1rem; }
        button.btn-login { background: var(--vert); color: black; font-weight: bold; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        button.btn-login:hover { box-shadow: 0 0 15px var(--vert); }

        /* === HEADER & MAILLOTS === */
        .header { text-align: center; padding: 20px 10px; }
        h1 { margin-top: 0; font-size: 1.8rem; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .maillot-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .maillot { 
            display: flex; flex-direction: column; align-items: center; 
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
        }
        .icon-maillot { font-size: 2.5rem; position: relative; line-height: 1; }
        .icon-symbole { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.2rem; }
        .maillot span { font-size: 0.8rem; margin-top: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* === LE STADE === */
        .stade {
            position: relative; width: 95%; max-width: 500px; margin: auto;
            background: linear-gradient(180deg, #0a1c10 0%, #040d07 100%);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 15px;
            padding: 40px 10px; transition: all 1s ease-in-out;
            box-shadow: 0 0 30px rgba(0,0,0,0.8) inset;
        }
        /* Effet quand le stade s'allume à la fin */
        .stade.victory { 
            box-shadow: 0 0 50px var(--vert), inset 0 0 50px rgba(57, 255, 20, 0.5); 
            border-color: var(--vert); 
            background: #0a2e15; 
        }

        /* Ballons & Points */
        .ligne-objectif { display: flex; align-items: center; margin: 30px 0; cursor: pointer; position: relative; z-index: 10; }
        .ligne-objectif:nth-child(even) { flex-direction: row-reverse; }
        
        .ballon-icon {
            font-size: 2.5rem; filter: grayscale(1) brightness(0.4); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; justify-content: center; align-items: center;
        }
        
        /* Animation et couleurs au clic */
        .active .ballon-icon { filter: grayscale(0) brightness(1); transform: scale(1.2) rotate(360deg); }
        .active.bleu .ballon-icon { filter: drop-shadow(0 0 15px var(--bleu)); }
        .active.vert .ballon-icon { filter: drop-shadow(0 0 15px var(--vert)); }
        .active.rose .ballon-icon { filter: drop-shadow(0 0 15px var(--rose)); }

        .nom-obj { margin: 0 15px; font-weight: bold; color: #555; font-size: 0.9rem; transition: 0.4s; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 10px; }
        .active.bleu .nom-obj { color: white; border-left: 3px solid var(--bleu); text-shadow: 0 0 5px var(--bleu); }
        .active.vert .nom-obj { color: white; border-left: 3px solid var(--vert); text-shadow: 0 0 5px var(--vert); }
        .active.rose .nom-obj { color: white; border-left: 3px solid var(--rose); text-shadow: 0 0 5px var(--rose); }

        /* Boutons de contrôle */
        .controls { position: fixed; bottom: 15px; right: 15px; z-index: 100; }
        .btn-ui { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: bold; background:#ff4444; color:white; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }

        /* Confettis */
        #canvas-confetti { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--vert);">🔒 Session Admin</h2>
            <p style="font-size: 0.8rem; color: #aaa;">Accès réservé FM Logistique</p>
            <input type="text" id="user" placeholder="Identifiant">
            <input type="password" id="pass" placeholder="Mot de passe">
            <button class="btn-login" onclick="checkLogin()">CONNEXION</button>
            <p id="error" style="color:#ff4444; font-size:0.9rem; margin-top:15px; font-weight:bold;"></p>
        </div>
    </div>

    <div class="header">
        <h1>🏆 OBJECTIF 2026</h1>
        <div class="maillot-container">
            <div class="maillot">
                <div class="icon-maillot" style="color: var(--bleu);">👕<span class="icon-symbole">👥</span></div>
                <span style="color: var(--bleu);">PEOPLE</span>
            </div>
            <div class="maillot">
                <div class="icon-maillot" style="color: var(--vert);">👕<span class="icon-symbole">🌱</span></div>
                <span style="color: var(--vert);">ENVIRON.</span>
            </div>
            <div class="maillot">
                <div class="icon-maillot" style="color: var(--rose);">👕<span class="icon-symbole">🤝</span></div>
                <span style="color: var(--rose);">VIVRE ENS.</span>
            </div>
        </div>
    </div>

    <div class="stade" id="arena">
        <svg id="svg-passes" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1;"></svg>
        
        <div id="list-objectifs">
            </div>
    </div>

    <div class="controls">
        <button class="btn-ui" onclick="resetApp()">🔄 Réinitialiser</button>
    </div>

    <canvas id="canvas-confetti"></canvas>

    <script>
        // Création des effets sonores
        const audioTing = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        const audioVictoire = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

        // Liste de tes objectifs
        const objectifs = [
            { id: 1, label: "Déployer le plan de formation", zone: "bleu" },
            { id: 2, label: "Atteindre la parité H/F", zone: "bleu" },
            { id: 3, label: "Lancer le mentorat interne", zone: "bleu" },
            { id: 4, label: "Réduire le bilan carbone de 20%", zone: "vert" },
            { id: 5, label: "Intégrer 30% de camions électriques", zone: "vert" },
            { id: 6, label: "Objectif zéro déchet plastique", zone: "vert" },
            { id: 7, label: "Atteindre zéro accident", zone: "rose" },
            { id: 8, label: "Organiser le tournoi sportif", zone: "rose" },
            { id: 9, label: "Signer la charte d'inclusion", zone: "rose" }
        ];

        // Chargement de l'avancement sauvegardé localement
        let state = JSON.parse(localStorage.getItem('fm_2026_state')) || [];

        function checkLogin() {
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value;
            // Identifiants : admin / admin
            if(u === 'admin' && p === 'admin') {
                document.getElementById('login-screen').style.display = 'none';
                init(); // Lance l'application
            } else {
                document.getElementById('error').innerText = "Identifiant ou mot de passe incorrect.";
            }
        }

        function init() {
            const container = document.getElementById('list-objectifs');
            container.innerHTML = '';
            
            objectifs.forEach(obj => {
                const isActive = state.includes(obj.id);
                const div = document.createElement('div');
                div.className = `ligne-objectif ${obj.zone} ${isActive ? 'active' : ''}`;
                div.dataset.id = obj.id;
                
                // On utilise un vrai emoji Ballon de foot ⚽
                div.innerHTML = `<div class="ballon-icon">⚽</div><div class="nom-obj">${obj.label}</div>`;
                
                div.onclick = () => toggleObj(obj.id, div, obj.zone);
                container.appendChild(div);
            });
            drawPasses();
            checkVictory(false); // Vérifie sans rejouer la musique
        }

        function toggleObj(id, el, zone) {
            // Empêche de décliquer ou de cliquer deux fois
            if (state.includes(id)) return; 
            
            // Joue le son Ting
            audioTing.currentTime = 0;
            audioTing.play().catch(e => console.log("Le navigateur bloque l'audio sans interaction."));

            state.push(id);
            el.classList.add('active');
            localStorage.setItem('fm_2026_state', JSON.stringify(state)); // Sauvegarde locale
            
            drawPasses();
            checkVictory(true); // Vérifie et joue la musique si gagné
        }

        function drawPasses() {
            const svg = document.getElementById('svg-passes');
            svg.innerHTML = '';
            for (let i = 0; i < state.length - 1; i++) {
                const start = document.querySelector(`[data-id="${state[i]}"] .ballon-icon`);
                const end = document.querySelector(`[data-id="${state[i+1]}"] .ballon-icon`);
                if (start && end) {
                    const rS = start.getBoundingClientRect();
                    const rE = end.getBoundingClientRect();
                    const rT = document.getElementById('arena').getBoundingClientRect();
                    
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    // Calcul du centre des ballons
                    line.setAttribute("x1", rS.left - rT.left + (rS.width/2));
                    line.setAttribute("y1", rS.top - rT.top + (rS.height/2));
                    line.setAttribute("x2", rE.left - rT.left + (rE.width/2));
                    line.setAttribute("y2", rE.top - rT.top + (rE.height/2));
                    line.setAttribute("stroke", "white");
                    line.setAttribute("stroke-width", "3");
                    line.setAttribute("stroke-dasharray", "8,8"); // Pointillés
                    svg.appendChild(line);
                }
            }
        }

        function checkVictory(jouerMusique) {
            if (state.length === objectifs.length) {
                // Allume le stade !
                document.getElementById('arena').classList.add('victory');
                
                if(jouerMusique) {
                    audioVictoire.currentTime = 0;
                    audioVictoire.play();
                    startConfetti();
                }
            }
        }

        function resetApp() {
            if(confirm("Attention, cela va effacer toute la progression sur cet appareil. Continuer ?")) {
                state = [];
                localStorage.removeItem('fm_2026_state');
                location.reload();
            }
        }

        // === MOTEUR DE CONFETTIS MAGIQUES ===
        function startConfetti() {
            const canvas = document.getElementById('canvas-confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];
            
            for(let i=0; i<150; i++) {
                particles.push({ 
                    x: Math.random() * canvas.width, 
                    y: Math.random() * canvas.height - canvas.height, 
                    r: Math.random() * 6 + 2, 
                    d: Math.random() * 10, 
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    tilt: Math.floor(Math.random() * 10) - 10
                });
            }
            
            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx.fillStyle = p.color; 
                    ctx.beginPath(); 
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); 
                    ctx.fill();
                    p.y += Math.cos(p.d) + 2 + p.r/2; 
                    p.x += Math.sin(0);
                    if(p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
                });
                requestAnimationFrame(draw);
            }
            draw();
            
            // Arrête les confettis après 10 secondes
            setTimeout(() => { canvas.style.display = 'none'; }, 10000);
        }
    </script>
</body>
</html>
