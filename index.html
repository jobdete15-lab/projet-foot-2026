<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Logistic - Fontenay Arena 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --fm-blue: #0033a0; --fm-cyan: #00b5e2; 
            --eco-green: #2ecc71; --partner-gold: #f1c40f;
            --pitch-1: #0a2412; --pitch-2: #0d2d16;
            --bg-dark: #020503;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; overflow: hidden; }

        /* === SYSTEME DE SLIDES === */
        .slider-container { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1); }
        .slide { width: 100vw; height: 100vh; position: absolute; top: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Positionnement des slides */
        #slide-1 { left: 0; }
        #slide-2 { left: 100vw; }
        #slide-3 { left: 200vw; }

        /* === NAVIGATION PAR FLECHES === */
        .nav-arrow { position: fixed; top: 50%; transform: translateY(-50%); width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 2px solid var(--fm-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 5000; transition: 0.3s; font-size: 24px; color: var(--fm-cyan); backdrop-filter: blur(5px); }
        .nav-arrow:hover { background: var(--fm-cyan); color: black; box-shadow: 0 0 20px var(--fm-cyan); }
        .arrow-left { left: 20px; display: none; }
        .arrow-right { right: 20px; }

        /* === SLIDE 1 : IDENTIQUE IMAGE (RE-CREATION CSS) === */
        .arena-intro { width: 100%; height: 100%; background: radial-gradient(circle at center, #1a2a44 0%, #050a15 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; text-align: center; }
        .stadium-bg { position: absolute; inset: 0; background: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=2000') center/cover no-repeat; opacity: 0.3; filter: grayscale(1) brightness(0.5); }
        .intro-content { z-index: 10; padding: 20px; }
        .intro-title { font-size: 5rem; font-weight: 900; letter-spacing: -2px; margin: 0; text-transform: uppercase; color: #fff; text-shadow: 0 0 30px rgba(0, 181, 226, 0.8); }
        .intro-subtitle { font-size: 1.8rem; letter-spacing: 2px; color: #a0d8f1; margin-top: -10px; font-weight: 300; }
        .intro-tagline { position: absolute; bottom: 80px; width: 100%; font-style: italic; font-size: 1.2rem; color: rgba(255,255,255,0.7); letter-spacing: 4px; }
        .intro-tagline::before, .intro-tagline::after { content: ''; position: absolute; top: 50%; width: 100px; height: 1px; background: linear-gradient(to right, transparent, white); margin: 0 20px; }

        /* === SLIDE 2 : TERRAIN TACTIQUE 3D === */
        .scene-3d { perspective: 1500px; width: 100%; height: 80vh; display: flex; align-items: center; justify-content: center; margin-top: 50px; }
        .pitch-3d { width: 1000px; height: 500px; background: repeating-linear-gradient(90deg, var(--pitch-1) 0, var(--pitch-1) 10%, var(--pitch-2) 10%, var(--pitch-2) 20%); border: 4px solid rgba(255,255,255,0.3); transform: rotateX(50deg) rotateZ(0deg); position: relative; box-shadow: 0 50px 100px rgba(0,0,0,0.8); transform-style: preserve-3d; }
        .pitch-3d::after { content: ''; position: absolute; inset: 15px; border: 2px solid rgba(255,255,255,0.4); pointer-events: none; }
        .mid-line { position: absolute; left: 50%; top: 15px; bottom: 15px; width: 2px; background: rgba(255,255,255,0.4); transform: translateX(-50%); }
        .center-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140px; height: 140px; border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; }
        
        /* Maillots */
        .maillot { position: absolute; width: 55px; height: 55px; transform: translate(-50%, -50%) rotateX(-50deg); cursor: pointer; transition: 0.3s; z-index: 100; display: flex; flex-direction: column; align-items: center; }
        .maillot:hover { transform: translate(-50%, -70%) rotateX(-50deg) scale(1.2); }
        .maillot-svg { width: 100%; height: 100%; filter: drop-shadow(0 10px 5px rgba(0,0,0,0.5)); }
        .num-badge { position: absolute; bottom: -15px; background: #000; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 1px solid #444; }
        
        /* Zones Tactiques */
        .bench { position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%) rotateX(-50deg); width: 250px; height: 60px; background: rgba(20,20,20,0.9); border: 1px solid #333; border-radius: 10px; display: flex; justify-content: center; gap: 30px; align-items: center; }

        /* === BULLES OBJECTIFS === */
        #obj-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal-card { background: #0a0a0a; border: 1px solid var(--fm-cyan); padding: 40px; border-radius: 20px; width: 450px; text-align: center; box-shadow: 0 0 50px rgba(0, 181, 226, 0.2); }
        .modal-title { font-size: 1.2rem; font-weight: bold; line-height: 1.5; margin: 20px 0; color: #fff; text-transform: uppercase; }

        /* === CHAT === */
        .chat-view { width: 80%; max-width: 700px; background: #111; height: 60vh; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; padding: 20px; }
        #chat-msgs { flex: 1; overflow-y: auto; background: #000; border-radius: 10px; padding: 15px; margin-bottom: 15px; }

        /* Animations */
        .ball-pass { position: absolute; font-size: 30px; z-index: 1000; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); pointer-events: none; }
        .maillot.active .maillot-svg { filter: drop-shadow(0 0 15px var(--fm-cyan)); }
    </style>
</head>
<body>

    <div class="nav-arrow arrow-left" onclick="moveSlide(-1)">&#10094;</div>
    <div class="nav-arrow arrow-right" onclick="moveSlide(1)">&#10095;</div>

    <div class="slider-container" id="master-slider">
        
        <div class="slide" id="slide-1">
            <div class="arena-intro">
                <div class="stadium-bg"></div>
                <div class="intro-content">
                    <h1 class="intro-title">FONTENAY ARENA 2026</h1>
                    <p class="intro-subtitle">La Coupe du Monde de notre performance</p>
                </div>
                <div class="intro-tagline">Explorer pour construire durablement.</div>
            </div>
        </div>

        <div class="slide" id="slide-2">
            <h1>PLAN TACTIQUE 3D</h1>
            <div class="scene-3d">
                <div class="pitch-3d" id="pitch">
                    <div class="mid-line"></div>
                    <div class="center-circle"></div>
                    <div id="players-layer"></div>
                </div>
                <div class="bench" id="bench-layer"></div>
            </div>
            <button onclick="annulerDernier()" style="background:none; border:1px solid #ff9800; color:#ff9800; padding:10px; cursor:pointer; border-radius:5px;">↩ Annuler dernière action</button>
        </div>

        <div class="slide" id="slide-3">
            <h1>COLLABORATION ÉQUIPE</h1>
            <div class="chat-view">
                <div id="chat-msgs"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="c-name" placeholder="Prénom" style="width:100px; padding:10px;">
                    <input type="text" id="c-txt" placeholder="Votre message..." style="flex:1; padding:10px;">
                    <button onclick="sendMsg()" style="padding:10px; background:var(--fm-cyan); border:none; cursor:pointer;">ENVOYER</button>
                </div>
            </div>
        </div>

    </div>

    <div id="obj-modal">
        <div class="modal-card">
            <div id="m-icon" style="font-size:3rem;">👥</div>
            <div class="modal-title" id="m-title">Objectif stratégique ici...</div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button onclick="valider()" style="padding:12px 25px; background:var(--fm-cyan); border:none; font-weight:bold; cursor:pointer; border-radius:5px;">OUI, VALIDER</button>
                <button onclick="closeModal()" style="padding:12px 25px; background:#333; color:white; border:none; cursor:pointer; border-radius:5px;">ANNULER</button>
            </div>
        </div>
    </div>

    <canvas id="confetti"></canvas>

    <script>
        // === CONFIG FIREBASE ===
        const firebaseConfig = {
            apiKey: "AIzaSyCJGFiEeRAa7Kar7YYilrtxirQbG5Yxo4E",
            authDomain: "projet-2026-be8d4.firebaseapp.com",
            databaseURL: "https://projet-2026-be8d4-default-rtdb.firebaseio.com",
            projectId: "projet-2026-be8d4",
            storageBucket: "projet-2026-be8d4.firebasestorage.app",
            messagingSenderId: "487136771744",
            appId: "1:487136771744:web:94f9efededb4038b1353c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Audio
        const sPasse = new Audio('https://assets.mixkit.co/active_storage/sfx/2143/2143-preview.mp3');
        const sWin = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

        // Maillots
        const svgMaillot = (color, icon) => `<svg viewBox="0 0 100 100" class="maillot-svg"><path d="M 20 25 L 35 10 L 65 10 L 80 25 L 80 40 L 65 40 L 65 90 L 35 90 L 35 40 L 20 40 Z" fill="${color}" stroke="white" stroke-width="2"/><text x="50" y="60" font-size="25" text-anchor="middle" fill="white">${icon}</text></svg>`;

        const objectives = [
            { id: 1, type: "PEOPLE", icon: "👥", pos: {l:10, t:50}, title: "Maintenir les rituels managériaux sécurité et lutter contre l'accidentologie entrepôt." },
            { id: 2, type: "PEOPLE", icon: "👥", pos: {l:30, t:20}, title: "Retravailler la communication et l'animation managériale via les outils de digitalisation." },
            { id: 3, type: "PLANET", icon: "🌍", pos: {l:30, t:45}, title: "Digitaliser la gestion des compétences pour assurer le suivi des formations." },
            { id: 4, type: "PLANET", icon: "🌍", pos: {l:30, t:75}, title: "Exploiter durablement le site et réduire l'empreinte carbone des opérations." },
            { id: 5, type: "PEOPLE", icon: "👥", pos: {l:50, t:20}, title: "Solution de housseuse automatisée pour l'amélioration des conditions de travail." },
            { id: 6, type: "PARTNER", icon: "🤝", pos: {l:50, t:50}, title: "Travailler l'amélioration continue client et déployer des actions concrètes en COPIL." },
            { id: 7, type: "PEOPLE", icon: "👥", pos: {l:50, t:80}, title: "Modernisation et rénovation des espaces briefing pour plus de convivialité." },
            { id: 8, type: "PARTNER", icon: "🤝", pos: {l:70, t:25}, title: "Réorganiser l'implantation zone packsize pour améliorer la performance logistique." },
            { id: 9, type: "PLANET", icon: "🌍", pos: {l:70, t:50}, title: "Optimisation rooftops Beebryte pour limiter l'impact thermique et énergétique." },
            { id: 10, type: "PARTNER", icon: "🤝", pos: {l:70, t:75}, title: "Garantir la conformité ICPE avec validation du porter à connaissance." },
            { id: 11, type: "PEOPLE", icon: "👥", pos: {l:85, t:50}, title: "Modernisation des salles de pause avec espaces de détente collaborateurs." },
            { id: 12, type: "PARTNER", icon: "🤝", bench: true, title: "Révision complète du PMS couvrant les volets HACCP, TACCP et VACCP." },
            { id: 13, type: "PLANET", icon: "🌍", bench: true, title: "Accompagnement Restos du Cœur et Café Joyeux via actions bénévolat." }
        ];

        let state = [];
        let currentSlide = 0;
        let pendingId = null;

        function init() {
            const pLayer = document.getElementById('players-layer');
            const bLayer = document.getElementById('bench-layer');
            objectives.forEach(obj => {
                const color = obj.type === "PEOPLE" ? "#00b5e2" : obj.type === "PLANET" ? "#2ecc71" : "#f1c40f";
                const div = document.createElement('div');
                div.className = "maillot";
                div.id = "m-"+obj.id;
                div.innerHTML = svgMaillot(color, obj.icon) + `<div class="num-badge">${obj.id}</div>`;
                div.onclick = () => openModal(obj);
                if(obj.bench) bLayer.appendChild(div); else { div.style.left = obj.pos.l+"%"; div.style.top = obj.pos.t+"%"; pLayer.appendChild(div); }
            });

            db.ref('arena_2026').on('value', snap => {
                const data = snap.val();
                state = data ? Object.keys(data).map(k => ({id: parseInt(k), t: data[k].t})).sort((a,b)=>a.t-b.t) : [];
                document.querySelectorAll('.maillot').forEach(m => m.classList.remove('active'));
                state.forEach(s => document.getElementById("m-"+s.id).classList.add('active'));
                if(state.length === 13) launchConfetti();
            });

            db.ref('arena_chat').on('value', snap => {
                const msgs = snap.val();
                const box = document.getElementById('chat-msgs'); box.innerHTML = '';
                if(msgs) Object.values(msgs).forEach(m => {
                    box.innerHTML += `<div class="msg-line"><b style="color:var(--fm-cyan)">${m.n}:</b> ${m.t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // Navigation
        function moveSlide(dir) {
            currentSlide = Math.min(Math.max(currentSlide + dir, 0), 2);
            document.getElementById('master-slider').style.transform = `translateX(-${currentSlide * 100}vw)`;
            document.querySelector('.arrow-left').style.display = currentSlide === 0 ? 'none' : 'flex';
            document.querySelector('.arrow-right').style.display = currentSlide === 2 ? 'none' : 'flex';
        }

        // Modal & Logic
        function openModal(obj) { if(state.find(s=>s.id===obj.id)) return; pendingId = obj.id; document.getElementById('m-title').innerText = obj.title; document.getElementById('m-icon').innerText = obj.icon; document.getElementById('obj-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('obj-modal').style.display = 'none'; }
        function valider() {
            const last = state.length > 0 ? state[state.length-1].id : null;
            closeModal();
            if(last) doPass(last, pendingId); else finishVal(pendingId);
        }

        function doPass(fromId, toId) {
            sPasse.play();
            const r1 = document.getElementById("m-"+fromId).getBoundingClientRect();
            const r2 = document.getElementById("m-"+toId).getBoundingClientRect();
            const ball = document.createElement('div'); ball.className = "ball-pass"; ball.innerText = "⚽";
            ball.style.left = r1.left+"px"; ball.style.top = r1.top+"px";
            document.body.appendChild(ball);
            setTimeout(() => { ball.style.left = r2.left+"px"; ball.style.top = r2.top+"px"; }, 50);
            setTimeout(() => { ball.remove(); finishVal(toId); }, 550);
        }

        function finishVal(id) {
            sonValidation.play();
            db.ref('arena_2026/'+id).set({t: Date.now()});
        }

        function annulerDernier() { if(state.length>0) db.ref('arena_2026/'+state[state.length-1].id).remove(); }
        function sendMsg() { const n = document.getElementById('c-name').value; const t = document.getElementById('c-txt').value; if(n && t) { db.ref('arena_chat').push({n, t}); document.getElementById('c-txt').value=''; } }

        function launchConfetti() { 
            sWin.play(); const c = document.getElementById('confetti'); c.style.display='block'; const ctx = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            let p = []; for(let i=0; i<200; i++) p.push({x:Math.random()*c.width, y:Math.random()*c.height, c:`hsl(${Math.random()*360},100%,50%)`, v:Math.random()*5+2});
            function draw() { ctx.clearRect(0,0,c.width,c.height); p.forEach(i=>{ ctx.fillStyle=i.c; ctx.fillRect(i.x,i.y,8,8); i.y+=i.v; if(i.y>c.height) i.y=-10; }); requestAnimationFrame(draw); }
            draw();
        }

        init();
    </script>
</body>
</html>
