<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Tactique Interactif</title>
    <style>
        /* === STYLE GLOBAL & TERRAIN === */
        body {
            background-color: #0a0e17; /* Fond très sombre */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            width: 90vw;
            max-width: 1200px;
            margin-bottom: 20px;
        }

        button.back-btn {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button.back-btn:hover { background-color: #555; }
        button.back-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* === LE TERRAIN === */
        #pitch {
            display: flex;
            width: 90vw;
            max-width: 1200px;
            height: 70vh;
            background: linear-gradient(to bottom, #111, #1a1a1a);
            border: 2px solid #333;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* Calque SVG pour dessiner les flèches et le ballon */
        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Laisse passer les clics vers les boutons en dessous */
            z-index: 5;
        }

        /* === LES ZONES === */
        .zone {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
            border-right: 2px dashed rgba(255,255,255,0.1);
        }
        .zone:last-child { border-right: none; }

        .zone-title {
            position: absolute;
            bottom: 20px;
            font-size: 2em;
            font-weight: bold;
            opacity: 0.2;
            letter-spacing: 5px;
            z-index: 1;
        }

        /* === LES OBJECTIFS (NOEUDS) === */
        .node {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #444;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 10;
            opacity: 0.4; /* Sombre au début */
            transition: all 0.4s ease;
            font-size: 0.9em;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .node:hover { opacity: 0.8; transform: scale(1.05); }

        /* État "Allumé" par zone */
        .node.active {
            opacity: 1;
            transform: scale(1.1);
            font-weight: bold;
        }

        /* Défense (Rouge) */
        .defense .node.active { border-color: #ff2a5f; box-shadow: 0 0 20px rgba(255, 42, 95, 0.6); text-shadow: 0 0 5px #ff2a5f; }
        .defense .zone-title { color: #ff2a5f; }

        /* Milieu (Vert) */
        .milieu .node.active { border-color: #2aff7b; box-shadow: 0 0 20px rgba(42, 255, 123, 0.6); text-shadow: 0 0 5px #2aff7b; }
        .milieu .zone-title { color: #2aff7b; }

        /* Attaque (Bleu) */
        .attaque .node.active { border-color: #2a8dff; box-shadow: 0 0 20px rgba(42, 141, 255, 0.6); text-shadow: 0 0 5px #2a8dff; }
        .attaque .zone-title { color: #2a8dff; }

    </style>
</head>
<body>

    <div class="header">
        <h2>Plan Tactique CAP 2027</h2>
        <button id="btn-back" class="back-btn" disabled>🔙 Revenir en arrière</button>
    </div>

    <div id="pitch">
        <svg id="svg-layer">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="white" opacity="0.6"/>
                </marker>
            </defs>
            <g id="lines-group"></g> </svg>

        <div class="zone defense">
            <div class="node" id="secu">Culture Sécurité</div>
            <div class="node" id="digital">Culture digital</div>
            <div class="node" id="housse">Housseuse automatisée</div>
            <div class="node" id="espaces">Espaces de vie</div>
            <div class="zone-title">DÉFENSE</div>
        </div>

        <div class="zone milieu">
            <div class="node" id="rh">Digitalisation RH</div>
            <div class="node" id="carbone">Empreinte carbone</div>
            <div class="node" id="beebryte">Beebryte B12</div>
            <div class="zone-title">MILIEU</div>
        </div>

        <div class="zone attaque">
            <div class="node" id="clients">Performance Clients</div>
            <div class="node" id="packsize">Packsize</div>
            <div class="node" id="qualite">Qualité (HACCP)</div>
            <div class="node" id="solidaire">Engagement solidaire</div>
            <div class="zone-title">ATTAQUE</div>
        </div>
    </div>

    <script>
        const nodes = document.querySelectorAll('.node');
        const svgLayer = document.getElementById('svg-layer');
        const linesGroup = document.getElementById('lines-group');
        const pitch = document.getElementById('pitch');
        const btnBack = document.getElementById('btn-back');

        let history = []; // Stocke l'historique des clics
        let currentNode = null; // Le point de départ actuel de la passe
        let isAnimating = false; // Empêche de cliquer pendant l'animation du ballon

        // Fonction pour obtenir le centre d'un élément par rapport au terrain
        function getCenter(el) {
            const pitchRect = pitch.getBoundingClientRect();
            const elRect = el.getBoundingClientRect();
            return {
                x: elRect.left - pitchRect.left + elRect.width / 2,
                y: elRect.top - pitchRect.top + elRect.height / 2
            };
        }

        // Fonction pour dessiner une ligne entre deux éléments
        function drawLine(start, end) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', start.x);
            line.setAttribute('y1', start.y);
            line.setAttribute('x2', end.x);
            line.setAttribute('y2', end.y);
            line.setAttribute('stroke', 'rgba(255,255,255,0.4)');
            line.setAttribute('stroke-width', '2');
            line.setAttribute('stroke-dasharray', '5,5');
            line.setAttribute('marker-end', 'url(#arrowhead)');
            linesGroup.appendChild(line);
        }

        // Fonction pour animer le ballon de start à end
        function animateBall(start, end, targetElement) {
            return new Promise((resolve) => {
                isAnimating = true;
                
                // Création du ballon (un cercle SVG)
                const ball = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                ball.setAttribute('r', '6');
                ball.setAttribute('fill', '#ffffff');
                ball.setAttribute('cx', start.x);
                ball.setAttribute('cy', start.y);
                svgLayer.appendChild(ball);

                // Animation avec l'API Web Animations
                const animation = ball.animate([
                    { cx: start.x, cy: start.y },
                    { cx: end.x, cy: end.y }
                ], {
                    duration: 800, // Temps de la passe en millisecondes
                    easing: 'ease-in-out',
                    fill: 'forwards'
                });

                animation.onfinish = () => {
                    svgLayer.removeChild(ball); // On supprime le ballon une fois arrivé
                    targetElement.classList.add('active'); // On allume l'objectif
                    isAnimating = false;
                    resolve();
                };
            });
        }

        // Gestion du clic sur un objectif
        nodes.forEach(node => {
            node.addEventListener('click', async () => {
                if (isAnimating) return; // Ignore le clic si un ballon bouge
                
                // Sauvegarde l'état actuel pour le bouton retour
                const currentState = {
                    nodeId: node.id,
                    htmlState: pitch.innerHTML,
                    prevNode: currentNode
                };

                if (!currentNode) {
                    // Premier clic : on allume juste l'élément
                    node.classList.add('active');
                    currentNode = node;
                    history.push(currentState);
                    btnBack.disabled = false;
                } else {
                    // Clics suivants : si l'élément n'est pas déjà actif
                    if (currentNode.id !== node.id) {
                        const startCenter = getCenter(currentNode);
                        const endCenter = getCenter(node);
                        
                        drawLine(startCenter, endCenter);
                        await animateBall(startCenter, endCenter, node);
                        
                        currentNode = node; // Le nouvel élément devient le point de départ
                        history.push(currentState);
                        btnBack.disabled = false;
                    }
                }
            });
        });

        // Gestion du bouton Retour en arrière
        btnBack.addEventListener('click', () => {
            if (isAnimating || history.length === 0) return;
            
            history.pop(); // Retire le dernier état
            
            // Efface toutes les lignes
            linesGroup.innerHTML = '';
            
            // Éteint tout le monde
            nodes.forEach(n => n.classList.remove('active'));

            if (history.length === 0) {
                // S'il n'y a plus rien, on remet à zéro
                currentNode = null;
                btnBack.disabled = true;
            } else {
                // On récupère l'état précédent
                const previousState = history[history.length - 1];
                currentNode = document.getElementById(previousState.nodeId);
                
                // On re-simule l'allumage de l'historique
                history.forEach(state => {
                    const el = document.getElementById(state.nodeId);
                    if(el) el.classList.add('active');
                });

                // On redessine les lignes précédentes (simplifié)
                for(let i = 0; i < history.length - 1; i++) {
                    const n1 = document.getElementById(history[i].nodeId);
                    const n2 = document.getElementById(history[i+1].nodeId);
                    drawLine(getCenter(n1), getCenter(n2));
                }
            }
        });
    </script>
</body>
</html>
